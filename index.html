const showResultScored=showResult;showResult=r=>{showResultScored(r);let tag=document.querySelector('.result-head .eyebrow'),head=document.querySelector('.result-head'),actions=document.querySelector('.actions'),desired=desiredModesOf(r);if(tag)tag.textContent=`CAREER EXPLORATORY MAP · v0.9.9 · ${r.mode==='standard'?'標準版':'がっつり版'}`;if(head)head.insertAdjacentHTML('afterend',`<div class="panel"><h3>今回選んだ探索方向</h3><div class="chips">${desired.map(x=>`<span class="chip">${x.label}</span>`).join('')||'<span class="note">未設定</span>'}</div><p class="note">この選択は候補を絞り込むものではなく、4択比較に出す候補の配合を少し調整するために使っています。</p></div><div class="panel"><p class="note">スコアは回答傾向をもとにした探索用の推定値です。比較回数が少ない候補は中央寄りに補正しており、追加比較によって順位が変わる可能性があります。</p></div>`);if(actions&&S.answerTrail.length){actions.insertAdjacentHTML('beforebegin','<button class="btn ghost" id="resultBack" style="width:100%;margin-top:10px">直前の回答に戻る</button>');$('#resultBack').onclick=()=>{let h=history().filter(x=>x.id!==r.id);localStorage.setItem('careerPairwiseLabHistory',JSON.stringify(h));goBack()}}};
const pairCurrent=pair;pair=()=>{pairCurrent();let edit=S.editingAnswer?.type==='pair'?S.editingAnswer.payload:null;if(edit){let chosen=root.querySelector(`[data-answer="${edit.answer}"]`);if(chosen)chosen.classList.add('chosen')}};
const promptForBase=promptFor;promptFor=r=>{let desired=desiredModesOf(r).map(x=>x.label).join('、')||'未設定',maxdiff=(r.maxDiffLogs||[]).slice(-8).map(x=>`${x.best} > ${x.neutral_ids?.length||0}候補 > ${x.worst}`).join(' / ')||'なし',pairs=(r.pairwiseLogs||[]).slice(-8).map(x=>`${x.a} vs ${x.b}: ${x.answer}`).join(' / ')||'なし';return `現在地: ${r.user_status?.label||'不明'}\n希望する・気になるキャリア形態: ${desired}\nこの選択は候補除外ではなく、MaxDiff候補セットの配合を調整する探索方向として使用しています。\nMaxDiff結果: ${maxdiff}\n接戦ペアワイズ結果: ${pairs}\n\n${promptForBase(r)}`};
const showResultReflection=showResult;showResult=r=>{showResultReflection(r);let actions=document.querySelector('.actions');if(!actions)return;let saved=r.reflectionAnswers||[],panelHtml=`<details class="panel" id="reflectionPanel"><summary>感想・気づきを任意でメモする</summary><p class="note">書かなくても結果は保存されています。あとから思ったことがあれば残してください。</p>${REFLECTION_QUESTIONS.map(q=>`<label class="reflection-q">${esc(q.text)}<textarea class="reflection" data-refid="${q.id}" maxlength="500" placeholder="任意">${esc(saved.find(x=>x.id===q.id)?.answer||'')}</textarea></label>`).join('')}<button class="btn secondary" id="saveReflection" style="margin-top:14px">メモを保存</button></details>`;actions.insertAdjacentHTML('beforebegin',panelHtml);$('#saveReflection').onclick=()=>{let answers=[...root.querySelectorAll('[data-refid]')].map(t=>({id:t.dataset.refid,text:REFLECTION_QUESTIONS.find(q=>q.id===t.dataset.refid).text,answer:t.value.trim()})).filter(x=>x.answer);let h=history(),idx=h.findIndex(x=>x.id===r.id);if(idx>=0){h[idx]={...h[idx],reflectionAnswers:answers};localStorage.setItem('careerPairwiseLabHistory',JSON.stringify(h))}r.reflectionAnswers=answers;toast('メモを保存しました')}};
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>t.dataset.tab==='history'?showHistory():reset());home();
})();
