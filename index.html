function promptFor(r){let insight=r.insights||insightFor(r),deep=r.mode!=='standard',fmt=list=>list.slice(0,5).map((x,i)=>`${i+1}. ${x.label}: displayScore ${x.displayScore} / 比較${x.played} / 信頼度${getConfidenceLabel(x.confidence)} / Best ${x.bestCount||0} / Worst ${x.worstCount||0}`).join('\n'),reasons=(r.comparisonLogs||[]).filter(x=>x.reason).map(x=>`- ${x.a} / ${x.b}: ${x.reason}`).join('\n')||'なし',reflection=(r.reflectionAnswers||[]).filter(x=>x.answer).map(x=>`- ${x.text}: ${x.answer}`).join('\n')||'なし',tradeoffs=(r.tradeoffLogs||[]).map(x=>`- ${x.aDescription} / ${x.bDescription}: ${x.answer}`).join('\n')||'なし',low=scoreCandidates(r).filter(x=>x.confidence<.4).slice(0,5).map(x=>x.label).join('、');return `これは${deep?'がっつり版':'標準版'}の探索型キャリア比較ログです。${r.mode==='deep_continuation'?'標準版の回答を引き継いだ追加分析です。':''}スコアは確定値ではなく探索用の推定値です。\n\n回答数: ${r.question_count}\ntrait上位: ${insight.topTraits.map(x=>`${x.label} ${x.score}`).join('、')}\n可能性マップ: ${insight.lean}\n総合候補:\n${fmt(insight.overall)}\n会社員寄り:\n${fmt(insight.company)}\n個人活動寄り:\n${fmt(insight.individual)}\n創作・副業寄り:\n${fmt(insight.creative)}\n接戦・迷い: ${insight.closeContests.join(' / ')}\n信頼度が低い候補: ${low}\n未探索: ${insight.unexplored.map(x=>x.label).join('、')}\n避けたい要素: ${(r.avoidFactors||[]).join('、')||'未選択'}\n比較理由:\n${reasons}\nトレードオフ回答:\n${tradeoffs}\n内省回答:\n${reflection}\n\n値を断定せず、迷いの構造と反証すべき問いを示してください。信頼度の低い候補から追加で比較すべき組み合わせ、話を聞く相手、小さく試す行動を提案してください。`;}
