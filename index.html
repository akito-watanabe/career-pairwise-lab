function home(){progress(0);screen(`<div class="hero"><div class="eyebrow">判断軸を見つける10〜15分</div><h1>答えより、<br>自分の基準を。</h1><p class="lead">2つずつ比べることで、興味・働き方・避けたいことを整理します。これは適職診断ではなく、次の行動を考えるための仮説づくりです。</p><button class="btn primary" id="start">比較をはじめる</button><p class="note">入力は端末内だけに保存され、外部へ送信されません。</p></div>`);$('#start').onclick=()=>select('status')}
function select(type){S.view=type;let isStatus=type==='status',list=D[type];progress(isStatus?.05:.1);screen(`<div class="eyebrow">${isStatus?'STEP 1 / 現在地':'STEP 2 / キャリア形態'}</div><h2>${isStatus?'今の自分に最も近いのは？':'今、最も近い働き方は？'}</h2><p class="lead">正解ではなく、現時点の感覚で選んでください。</p><div class="choice-list">${list.map(x=>`<button class="choice" data-id="${x.id}"><strong>${x.label}</strong><span>${x.description}</span></button>`).join('')}</div><div class="navrow"><button class="link" id="back">← 戻る</button><button class="link" id="reset">最初から</button></div>`);root.querySelectorAll('.choice').forEach(b=>b.onclick=()=>{S[type]=b.dataset.id;if(isStatus)select('career');else if(S.career==='hybrid')hybrid();else{S.mode=['company_employee','public_org'].includes(S.career)?'company':'solo';transition('interest')}});$('#back').onclick=isStatus?home:()=>select('status');$('#reset').onclick=reset}
function hybrid(){screen(`<div class="eyebrow">分岐の確認</div><h2>複業のどちら側を中心に考える？</h2><p class="lead">今回の比較で、より深く整理したい側を選んでください。</p><div class="choice-list"><button class="choice" data-mode="company"><strong>会社員・組織の仕事</strong><span>業界と職種を比較する</span></button><button class="choice" data-mode="solo"><strong>個人活動・副業</strong><span>活動ジャンルと収益モデルを比較する</span></button></div><div class="navrow"><button class="link" id="back">← 戻る</button><button class="link" id="reset">最初から</button></div>`);root.querySelectorAll('[data-mode]').forEach(b=>b.onclick=()=>{S.mode=b.dataset.mode;transition('interest')});$('#back').onclick=()=>select('career');$('#reset').onclick=reset}
const phases=()=>S.mode==='company'?['interest','industry','job','style','avoid']:['interest','solo','revenue','soloStyle','risk'];
function candidates(phase){if(phase==='industry'){let top=topIds('interest',4);return D.industry.map(x=>({...x,fit:x.related_interest_areas.filter(i=>top.includes(i)).length})).sort((a,b)=>b.fit-a.fit).slice(0,8)}if(phase==='job'){let topI=topIds('interest',4),topN=topIds('industry',3);return D.job.map(x=>({...x,fit:x.related_interest_areas.filter(i=>topI.includes(i)).length+x.related_industries.filter(i=>topN.includes(i)).length})).sort((a,b)=>b.fit-a.fit).slice(0,8)}if(phase==='solo'){let top=topIds('interest',4),pref={creator:['music_live','illustration_art','video_streaming','writing_editing','photo_movie'],small_business:['kitchen_car','small_restaurant','beauty_bodycare','local_farming'],freelance:['it_freelance','consulting_advisor','writing_editing','photo_movie']}[S.career]||[];return D.solo.map((x,i)=>({...x,fit:(pref.includes(x.id)?3:0)+(top.includes('creative_expression')&&['music_live','illustration_art','video_streaming','writing_editing','photo_movie'].includes(x.id)?2:0)+(top.includes('talk_solve')&&['beauty_bodycare','teaching_coaching','consulting_advisor'].includes(x.id)?2:0)-i/100})).sort((a,b)=>b.fit-a.fit).slice(0,8)}if(phase==='revenue'){let top=topIds('solo',3),bias={product_sales:['handmade_goods','online_shop','illustration_art'],service_sales:['beauty_bodycare','consulting_advisor'],contract_work:['it_freelance','photo_movie','writing_editing'],lesson_course:['teaching_coaching'],event_live:['music_live','kitchen_car'],store_sales:['small_restaurant','kitchen_car'],ad_sns:['video_streaming'],license_rights:['music_live','illustration_art']};return D.revenue.map(x=>({...x,fit:(bias[x.id]||[]).filter(i=>top.includes(i)).length})).sort((a,b)=>b.fit-a.fit).slice(0,8)}return D[phase]}
const names={interest:'興味軸',industry:'業界',job:'職種',style:'仕事スタイル',solo:'個人活動ジャンル',revenue:'収益モデル',soloStyle:'個人活動スタイル',avoid:'避けたい要素',risk:'個人活動リスク'};
const intros={interest:['L1','興味軸','あなたが何に触れていると面白そうかを見ます。業界名や職種名ではなく、「どんな対象に惹かれるか」を比べます。','迷ったら、今の自分が「まだ気になる方」を選んでください。'],industry:['L2','業界','どのフィールドで働くことに惹かれるかを見ます。会社規模や職種ではなく、業界・領域を比べます。','知らない業界は、今の印象で選んで大丈夫です。'],job:['L3','職種','どんな仕事の中身に惹かれるかを見ます。業界とは切り分けて、「何をする仕事が気になるか」を比べます。','経験の有無ではなく、仕事内容への関心で選んでください。'],style:['L4','仕事スタイル','どんな進め方・働き方が合いそうかを見ます。','正解ではなく、今の自分に近い方を選んでください。'],avoid:['L5','避けたい要素','できれば避けたい働き方や、入社前に確認したい条件を整理します。','ここは2択ではなく、当てはまるものをチェックします。'],solo:['B-L2','個人活動ジャンル','どんな商品・サービス・表現活動に惹かれるかを見ます。','実現性よりも、まず試してみたい感覚で選んでください。'],revenue:['B-L3','収益モデル','どのような価値提供と対価の得方に惹かれるかを見ます。','今すぐ可能かではなく、続けたい形を比べてください。'],soloStyle:['B-L4','個人活動スタイル','個人で活動するとき、どんな進め方が合いそうかを見ます。','理想像ではなく、無理なく続けられそうな方を選んでください。'],risk:['B-L5','個人活動リスク','独立・副業前に避けたいこと、確認したいリスクを整理します。','ここは2択ではなく、気になるものをチェックします。'],result:['RESULT','結果','比較から見えた優先順位と、その根拠を確認します。','結果は適職の断定ではなく、次に調べるための仮説として使ってください。']};
function transition(phase){let d=intros[phase],i=phase==='result'?phases().length:Math.max(0,phases().indexOf(phase));progress(.12+.78*(i/phases().length));screen(`<div class="section-intro"><div class="section-no">${d[0]}</div><div class="eyebrow">SECTION ${i+1} / ${phases().length+1}</div><h2>次は「${d[1]}」${phase==='result'?'です':'を比較します'}</h2><p class="lead">${d[2]}</p><div class="tip"><b>回答のコツ</b><br>${d[3]}</div><button class="btn primary" id="next">次へ</button><div class="navrow"><span></span><button class="link" id="reset">最初から</button></div></div>`);$('#next').onclick=()=>phase==='result'?complete():startPhase(phase);$('#reset').onclick=reset}
function shuffle(items){let a=[...items];for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function makePairs(list){let q=[];for(let i=0;i<list.length;i++)for(let j=i+1;j<list.length;j++)q.push([list[i],list[j]]);return shuffle(q)}
function emptyStat(x){return{id:x.id,label:x.label,score:0,wins:0,losses:0,draws:0,unknowns:0,played:0,winRate:0}}
function startPhase(phase){S.phase=phase;S.index=0;S.isTieBreak=false;S.tieBreakCount=0;S.scores[phase]={};let list=candidates(phase);list.forEach(x=>S.scores[phase][x.id]=emptyStat(x));if(['avoid','risk'].includes(phase)){checks(list);return}S.queue=makePairs(list);pair()}
function progress(extra){let p=extra??(.12+.78*((phases().indexOf(S.phase)+(S.index/Math.max(S.queue.length,1)))/phases().length));$('.progress').hidden=!p;$('.progress i').style.width=`${p*100}%`}
function pair(){let[a,b]=S.queue[S.index];progress();let tie=S.isTieBreak;screen(`<div class="eyebrow">${names[S.phase]}の比較 ${S.index+1} / ${S.queue.length}</div><h2>${tie?'上位がかなり接戦です。':'今、より惹かれるのは？'}</h2>${tie?'<p class="note">順位を確かめるため、上位候補をもう一度比べます。</p>':''}<div class="pair"><button class="pair-card" data-answer="a"><b>${a.label}</b><span>${a.description}</span></button><button class="pair-card" data-answer="b"><b>${b.label}</b><span>${b.description}</span></button></div><div class="or"><button data-answer="both">どちらもあり</button><button data-answer="neither">どちらも微妙</button><button data-answer="unknown">わからない</button></div><input class="reason" id="reason" maxlength="100" placeholder="理由を一言（任意）"><div class="navrow"><button class="link" id="back">← 戻る</button><button class="link" id="reset">最初から</button></div>`);root.querySelectorAll('[data-answer]').forEach(x=>x.onclick=()=>answer(x.dataset.answer,a,b));$('#back').onclick=backPair;$('#reset').onclick=reset}
function applyAnswer(ans,a,b,sign=1){let A=S.scores[S.phase][a.id],B=S.scores[S.phase][b.id];if(ans==='unknown'){A.unknowns+=sign;B.unknowns+=sign;return}A.played+=sign;B.played+=sign;if(ans==='a'){A.score+=3*sign;A.wins+=sign;B.losses+=sign}else if(ans==='b'){B.score+=3*sign;B.wins+=sign;A.losses+=sign}else{A.draws+=sign;B.draws+=sign;if(ans==='both'){A.score+=sign;B.score+=sign}}}
function answer(ans,a,b){let reason=$('#reason').value.trim(),log={phase:S.phase,aId:a.id,bId:b.id,a:a.label,b:b.label,answer:ans,reason,tieBreak:S.isTieBreak};applyAnswer(ans,a,b);(S.isTieBreak?S.tieLogs:S.logs).push(log);S.index++;if(S.index<S.queue.length)pair();else finishPhase()}
function backPair(){if(!S.index){restartPhase(S.phase);return}let log=(S.isTieBreak?S.tieLogs:S.logs).pop(),[a,b]=S.queue[--S.index];applyAnswer(log.answer,a,b,-1);pair()}
function restartPhase(phase){S.logs=S.logs.filter(x=>x.phase!==phase);S.tieLogs=S.tieLogs.filter(x=>x.phase!==phase);delete S.rankings[phase];startPhase(phase)}
function hybridOrCareer(){S.career==='hybrid'?hybrid():select('career')}
function headToHead(a,b){let wins={};[...S.logs,...S.tieLogs].filter(x=>x.phase===S.phase&&((x.aId===a&&x.bId===b)||(x.aId===b&&x.bId===a))).forEach(x=>{let id=x.answer==='a'?x.aId:x.answer==='b'?x.bId:null;if(id)wins[id]=(wins[id]||0)+1});return (wins[a]||0)===(wins[b]||0)?null:(wins[a]||0)>(wins[b]||0)?a:b}
function reasonsFor(id,p){return [...S.logs,...S.tieLogs].filter(x=>x.phase===p&&x.reason&&((x.aId===id&&['a','both'].includes(x.answer))||(x.bId===id&&['b','both'].includes(x.answer)))).map(x=>x.reason).slice(0,2)}
function ranking(p){let stats=Object.values(S.scores[p]||{}).map(x=>({...x,winRate:x.played?x.wins/x.played:0,mainReasons:reasonsFor(x.id,p)}));let old=S.phase;S.phase=p;stats.sort((a,b)=>b.score-a.score||b.winRate-a.winRate||b.wins-a.wins||(headToHead(a.id,b.id)===a.id?-1:headToHead(a.id,b.id)===b.id?1:a.label.localeCompare(b.label,'ja')));S.phase=old;return stats}
function topIds(p,n){return (S.rankings[p]||ranking(p)).slice(0,n).map(x=>x.id)}
function finishPhase(){S.rankings[S.phase]=ranking(S.phase);if(!S.isTieBreak&&needsTieBreak(S.rankings[S.phase])){let top=S.rankings[S.phase].slice(0,3).map(x=>candidates(S.phase).find(y=>y.id===x.id)),q=[];for(let i=0;i<top.length;i++)for(let j=i+1;j<top.length;j++)q.push([top[i],top[j]]);S.isTieBreak=true;S.queue=shuffle(q).slice(0,3);S.index=0;S.tieBreakCount=S.queue.length;pair();return}let i=phases().indexOf(S.phase);if(i<phases().length-1)transition(phases()[i+1]);else transition('result')}
function needsTieBreak(r){if(r.length<2)return false;return r[0].score-r[1].score<=2||(r.length>2&&r[0].score===r[2].score)||r.slice(0,3).some(x=>x.played<3)}
function checks(list){progress();let title=S.mode==='company'?'避けたい働き方は？':'避けたいリスクは？';screen(`<div class="eyebrow">${names[S.phase]} · チェック形式</div><h2>${title}</h2><p class="lead">該当するものをすべて選んでください。未選択でも進めます。</p><div class="checks">${list.map(x=>`<label class="check"><input type="checkbox" value="${x.id}"><span><b>${x.label}</b><small>${x.description}</small></span></label>`).join('')}</div><button class="btn primary" id="done">回答を確定</button><div class="navrow"><button class="link" id="back">← 戻る</button><button class="link" id="reset">最初から</button></div>`);$('#done').onclick=()=>{S.avoid=[...root.querySelectorAll('input:checked')].map(x=>x.value);transition('result')};$('#back').onclick=()=>transition(S.phase);$('#reset').onclick=reset}
const keyMap={interest:'interests',industry:'industries',job:'jobTypes',style:'workStyles',solo:'soloGenres',revenue:'revenueModels',soloStyle:'soloStyles'};
function packed(source){let out={interests:[],industries:[],jobTypes:[],workStyles:[],soloGenres:[],revenueModels:[],soloStyles:[]};Object.entries(keyMap).forEach(([p,k])=>out[k]=source[p]||[]);return out}
function getRank(r,p){return(r.rankings||{})[keyMap[p]]||(r.rankings||{})[p]||[]}
function complete(){let rec=record();save(rec);showResult(rec)}
function record(){let status={id:S.status,label:label(D.status,S.status)},career={id:S.career,label:label(D.career,S.career)},rankings=packed(S.rankings),comparisonStats=packed(Object.fromEntries(Object.keys(S.scores).map(p=>[p,Object.values(S.scores[p]).map(x=>({...x,winRate:x.played?x.wins/x.played:0}))])));let base={id:String(Date.now()),created_at:new Date().toISOString(),user_status:status,career_mode:career,mode:S.mode,rankings,comparisonStats,comparisonLogs:S.logs,tieBreakLogs:S.tieLogs,avoidFactors:S.avoid.map(id=>label(S.mode==='company'?D.avoid:D.risk,id))};base.aiPrompt=promptFor(base);return base}
function promptFor(r){let rk=(p,n=5)=>getRank(r,p).slice(0,n).map((x,i)=>`${i+1}. ${x.label}: ${x.score}点 / ${x.wins}勝${x.draws}分${x.losses}敗 / 勝率${Math.round(x.winRate*100)}%${x.mainReasons&&x.mainReasons.length?` / 理由: ${x.mainReasons.join('、')}`:''}`).join('\n');let logs=[...(r.comparisonLogs||[]),...(r.tieBreakLogs||[])],reasons=logs.filter(x=>x.reason).map(x=>`- ${x.a} / ${x.b}: ${x.reason}`).join('\n')||'なし',close=[];Object.entries(r.rankings).forEach(([k,v])=>{if(v.length>1&&v[0].score-v[1].score<=2)close.push(`${k}: ${v[0].label}と${v[1].label}`)});let branch=r.mode==='company'?`業界ランキング:\n${rk('industry')}\n職種ランキング:\n${rk('job')}`:`活動ジャンルランキング:\n${rk('solo')}\n収益モデルランキング:\n${rk('revenue')}`;return `あなたはキャリア意思決定の支援者です。以下を適職診断のように断定せず、本人の関心と判断軸についての仮説として分析してください。\n\n現在地: ${r.user_status.label}\nキャリア形態: ${r.career_mode.label}（${r.mode==='company'?'組織所属':'個人活動'}モード）\n興味軸ランキング:\n${rk('interest')}\n${branch}\n仕事スタイルランキング:\n${rk(r.mode==='company'?'style':'soloStyle')}\n同点・僅差: ${close.join('、')||'特になし'}\n避けたい要素・リスク: ${r.avoidFactors.join('、')||'未選択'}\n選択理由:\n${reasons}\n\n次の形式で回答してください。\n1. 関心が寄っている可能性がある方向（仮説を3つ）\n2. 仮説を確かめるため次に調べること\n3. 追加で比較すべき選択肢\n4. キャリア相談で深掘りすべき質問\n5. 注意すべきトレードオフ\n断定表現は避け、不足情報を明示してください。`;}
function save(r){let h=history();h.unshift(r);localStorage.setItem('careerPairwiseLabHistory',JSON.stringify(h.slice(0,30)))}function history(){try{return JSON.parse(localStorage.getItem('careerPairwiseLabHistory'))||[]}catch{return[]}}
function ranks(title,items){return `<div class="panel"><h3>${title}</h3>${(items||[]).slice(0,5).map((x,i)=>{let played=x.played||0,rate=Math.round((x.winRate||0)*100),reason=(x.mainReasons||[])[0];return `<div class="rank-wrap"><div class="rank"><span class="num">${i+1}</span><b>${x.label}</b><em>${x.score} pt</em></div><div class="rank-meta">${x.wins||0}勝 ${x.draws||0}分 ${x.losses||0}敗 · ${played}比較 · 勝率${rate}%</div>${reason?`<div class="rank-reason">理由例：${esc(reason)}</div>`:''}</div>`}).join('')}</div>`}
function showResult(r){progress(1);let company=r.mode==='company',style=company?'style':'soloStyle',industries=getRank(r,'industry'),jobs=getRank(r,'job'),solos=getRank(r,'solo'),revenues=getRank(r,'revenue'),avoid=r.avoidFactors||r.avoid_factors||[],prompt=r.aiPrompt||r.ai_prompt||'',next=company?`上位の「${industries[0].label}」で「${jobs[0].label}」が実際に担う業務と、未経験からの入口を調べる。`:`「${solos[0].label}」を、費用と期間を限定した小さな試作品・体験提供から試す。`,who=company?`${industries[0].label}で${jobs[0].label}に近い仕事をする人`:`${solos[0].label}を副業または小規模で続けている人`;screen(`<div class="result-head"><div class="eyebrow">YOUR WORKING HYPOTHESIS</div><h2>結果は、次に進むための仮説です。</h2><p>スコアだけでなく、比較数・勝敗・勝率も根拠として確認できます。</p></div>${ranks('興味軸',getRank(r,'interest'))}${company?ranks('業界',industries)+ranks('職種',jobs):ranks('個人活動ジャンル',solos)+ranks('収益モデル',revenues)}${ranks(company?'仕事スタイル':'個人活動スタイル',getRank(r,style))}<div class="panel"><h3>${company?'避けたい要素':'避けたいリスク'}</h3><div class="chips">${avoid.length?avoid.map(x=>`<span class="chip">${x}</span>`).join(''):'<span class="note">未選択</span>'}</div></div><div class="panel"><h3>${company?'次に調べること':'小さく始めるなら'}</h3><p>${next}</p><h3>話を聞くなら</h3><p>${who}</p></div><div class="panel"><h3>AI分析用プロンプト</h3><p class="note">任意のAIサービスへ自分で貼り付けて使えます。外部送信はしません。</p><div class="prompt">${esc(prompt)}</div><button class="btn secondary" id="copy">プロンプトをコピー</button></div><div class="actions"><button class="btn ghost" id="reset">最初から</button><button class="btn primary" id="hist">履歴を見る</button></div>`);$('#copy').onclick=()=>copy(prompt);$('#reset').onclick=reset;$('#hist').onclick=showHistory}
function showHistory(){progress(0);document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x.dataset.tab==='history'));let h=history();screen(`<div class="eyebrow">LOCAL HISTORY</div><h2>過去の比較結果</h2><p class="lead">この端末内に最大30件保存されます。</p>${h.length?`<div class="history">${h.map(x=>`<button class="history-item" data-id="${x.id}"><time>${new Date(x.created_at).toLocaleString('ja-JP')}</time><h3>${x.career_mode.label} · ${x.user_status.label}</h3><span class="note">興味軸: ${getRank(x,'interest').slice(0,3).map(y=>y.label).join('、')}</span></button>`).join('')}</div>`:`<div class="empty">まだ結果がありません。</div>`}`);root.querySelectorAll('[data-id]').forEach(b=>b.onclick=()=>showResult(h.find(x=>x.id===b.dataset.id)))}
function reset(){if(S.view!=='home'&&!confirm('入力中の内容を消して最初からやり直しますか？'))return;S={view:'home',status:null,career:null,mode:null,phase:null,index:0,queue:[],scores:{},logs:[],tieLogs:[],rankings:{},avoid:[],isTieBreak:false,tieBreakCount:0};document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x.dataset.tab==='app'));home()}
function copy(t){if(navigator.clipboard&&isSecureContext)navigator.clipboard.writeText(t).then(toast).catch(()=>fallback(t));else fallback(t)}function fallback(t){let a=document.createElement('textarea');a.value=t;document.body.append(a);a.select();document.execCommand('copy');a.remove();toast()}function toast(){let t=$('#toast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1600)}function esc(s){return s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>t.dataset.tab==='history'?showHistory():reset());home();
})();
</script></body></html>
