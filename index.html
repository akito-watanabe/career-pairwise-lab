<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#17261f">
  <!-- PWA（v1.6.0）：manifest/sw.jsが無い環境（index.html単体配布）でも全機能が動作する -->
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="icon" type="image/png" href="icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="キャリア比較">
  <title>キャリア比較ラボ v1.6.0</title>
  <style>
  /* ==== ベース：カラーパレット・リセット ==== */
  :root {
    --ink: #17261f;
    --muted: #657069;
    --paper: #f5f2e9;
    --card: #fffdf7;
    --line: #d8d8cd;
    --accent: #db5d3b;
    --green: #2e6b52;
    --soft: #e5eee7;
    --shadow: 0 12px 36px #17261f14;
    --shadow-soft: #17261f08;
    --hairline: #ebe9e1;
  }

  * {
    box-sizing: border-box;
  }

  html {
    background: var(--ink);
  }

  body {
    margin: 0;
    min-height: 100svh;
    font-family:
      system-ui,
      -apple-system,
      "Noto Sans JP",
      sans-serif;
    color: var(--ink);
    background: var(--paper);
  }

  button,
  input,
  textarea {
    font: inherit;
  }

  button {
    cursor: pointer;
  }

  .app {
    max-width: 720px;
    margin: auto;
    min-height: 100svh;
    padding: env(safe-area-inset-top) 18px env(safe-area-inset-bottom);
    background: var(--paper);
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
  }

  .brand {
    font-weight: 850;
    letter-spacing: -0.04em;
  }

  .brand small {
    display: block;
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--green);
  }

  .tabs {
    display: flex;
    border-radius: 12px;
    padding: 3px;
    background: #e8e5dc;
  }

  .tab {
    border: 0;
    padding: 8px 12px;
    border-radius: 9px;
    font-size: 13px;
    background: transparent;
    color: var(--muted);
  }

  .tab.active {
    background: var(--card);
    color: var(--ink);
    box-shadow: 0 2px 8px #0000000c;
  }

  .progress {
    height: 4px;
    border-radius: var(--radius-pill);
    overflow: hidden;
    background: #dfddd4;
  }

  .progress > i {
    display: block;
    height: 100%;
    background: var(--accent);
    transition: width 0.3s;
  }

  .screen {
    padding: 28px 0 90px;
  }

  .eyebrow {
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--green);
  }

  .hero {
    padding-top: 56px;
  }

  h1 {
    margin: 12px 0 20px;
    font-size: clamp(34px, 10vw, 58px);
    line-height: 1.05;
    letter-spacing: -0.055em;
  }

  h2 {
    margin: 8px 0;
    font-size: 27px;
    line-height: 1.25;
    letter-spacing: -0.035em;
  }

  h3 {
    margin: 0 0 10px;
    font-size: 18px;
  }

  .lead {
    margin-bottom: 34px;
    font-size: 16px;
    line-height: 1.8;
    color: var(--muted);
  }

  .btn {
    border: 0;
    border-radius: 16px;
    min-height: 54px;
    padding: 14px 20px;
    font-weight: 800;
  }

  .btn.primary {
    width: 100%;
    background: var(--ink);
    color: white;
  }

  .btn.secondary {
    background: var(--soft);
    color: var(--green);
  }

  .btn.ghost {
    border: 1px solid var(--line);
    background: transparent;
  }

  .actions {
    display: flex;
    gap: 10px;
    margin-top: 18px;
  }

  .actions > * {
    flex: 1;
  }

  /* ==== 選択リスト（現在地・キャリア形態） ==== */
  .choice-list {
    display: grid;
    gap: 12px;
    margin-top: 24px;
  }

  .choice {
    width: 100%;
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 18px;
    min-height: 56px;
    text-align: left;
    background: var(--card);
    box-shadow: 0 3px 12px var(--shadow-soft);
  }

  .choice strong {
    display: block;
    font-size: 17px;
  }

  .choice span {
    display: block;
    margin-top: 5px;
    font-size: 13px;
    line-height: 1.55;
    color: var(--muted);
  }

  /* ==== 2択比較カード ==== */
  .pair {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin: 24px 0 14px;
  }

  .pair-card {
    min-height: 190px;
    border: 2px solid transparent;
    border-radius: 22px;
    padding: 19px;
    text-align: left;
    background: var(--card);
    box-shadow: var(--shadow);
  }

  .pair-card:active {
    border-color: var(--accent);
    transform: scale(0.985);
  }

  .pair-card b {
    display: block;
    margin-bottom: 12px;
    font-size: 20px;
    line-height: 1.25;
  }

  .pair-card span {
    font-size: 13px;
    line-height: 1.6;
    color: var(--muted);
  }

  .or {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 7px;
  }

  .or button {
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 10px 5px;
    font-size: 12px;
    background: transparent;
    color: var(--muted);
  }

  .reason {
    width: 100%;
    border: 1px solid var(--line);
    border-radius: 13px;
    padding: 13px 14px;
    margin-top: 12px;
    background: var(--card);
  }

  .navrow {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 22px;
  }

  .link {
    border: 0;
    padding: 10px 0;
    background: none;
    color: var(--muted);
  }

  .checks {
    display: grid;
    gap: 9px;
    margin: 24px 0;
  }

  .check {
    display: flex;
    gap: 12px;
    border: 1px solid var(--line);
    border-radius: 15px;
    padding: 14px;
    background: var(--card);
  }

  .check input {
    width: 20px;
    accent-color: var(--accent);
  }

  .check b {
    display: block;
  }

  .check small {
    display: block;
    margin-top: 3px;
    line-height: 1.4;
    color: var(--muted);
  }

  .result-head {
    border-radius: 24px;
    padding: 25px;
    margin-bottom: 16px;
    background: var(--ink);
    color: white;
  }

  .result-head .eyebrow {
    color: #a9cbb9;
  }

  .result-head h2 {
    font-size: 32px;
  }

  .result-head p {
    line-height: 1.6;
    color: #c7d0ca;
  }

  .panel {
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 22px 20px;
    margin: 16px 0;
    background: var(--card);
  }

  .rank {
    display: flex;
    align-items: center;
    gap: 11px;
    padding: 10px 0;
    border-bottom: 1px solid var(--hairline);
  }

  .rank:last-child {
    border: 0;
  }

  .rank .num {
    display: grid;
    place-items: center;
    width: 25px;
    height: 25px;
    border-radius: 50%;
    font-size: 12px;
    font-weight: 900;
    background: var(--soft);
  }

  .rank b {
    flex: 1;
  }

  .rank em {
    font-style: normal;
    font-size: 12px;
    color: var(--green);
  }

  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
  }

  .chip {
    border-radius: var(--radius-pill);
    padding: 8px 11px;
    font-size: 12px;
    background: #f1eee6;
  }

  .prompt {
    max-height: 250px;
    overflow: auto;
    border-radius: 12px;
    padding: 14px;
    white-space: pre-wrap;
    font-size: 12px;
    line-height: 1.6;
    background: #f0eee7;
  }

  /* ==== 履歴リスト ==== */
  .history {
    display: grid;
    gap: 10px;
  }

  .history-item {
    border: 1px solid var(--line);
    border-radius: 17px;
    padding: 16px;
    text-align: left;
    background: var(--card);
  }

  .history-item time {
    font-size: 12px;
    color: var(--muted);
  }

  .empty {
    padding: 70px 20px;
    text-align: center;
    color: var(--muted);
  }

  .note {
    font-size: 12px;
    line-height: 1.6;
    color: var(--muted);
  }

  /* ==== トースト通知 ==== */
  .toast {
    position: fixed;
    left: 50%;
    bottom: 28px;
    padding: 12px 18px;
    border-radius: var(--radius-pill);
    font-size: 13px;
    background: var(--ink);
    color: white;
    opacity: 0;
    transform: translateX(-50%);
    pointer-events: none;
    transition: 0.2s;
  }

  .toast.show {
    opacity: 1;
  }

  @media (max-width: 430px) {
    .pair {
      grid-template-columns: 1fr;
    }

    .pair-card {
      min-height: 128px;
    }

    .screen {
      padding-top: 20px;
    }

    .hero {
      padding-top: 38px;
    }
  }

  .section-intro {
    padding-top: 42px;
  }

  .section-no {
    font-size: 72px;
    line-height: 1;
    font-weight: 900;
    letter-spacing: -0.08em;
    color: #dfe8e1;
  }

  .tip {
    border-left: 3px solid var(--accent);
    padding: 3px 0 3px 14px;
    margin: 24px 0;
    line-height: 1.7;
    color: var(--muted);
  }

  .rank-wrap {
    padding: 10px 0;
    border-bottom: 1px solid var(--hairline);
  }

  .rank-wrap:last-child {
    border: 0;
  }

  .rank-wrap .rank {
    border: 0;
    padding: 0;
  }

  .rank-meta,
  .candidate-desc {
    font-size: 13px;
    color: var(--muted);
  }

  .candidate-detail {
    margin: 5px 0 0 36px;
    font-size: 13px;
    line-height: 1.55;
    color: var(--muted);
    opacity: 0.85;
  }

  /* ==== 可視化（レーダー・マップ・推移） ==== */
  .viz {
    display: block;
    width: 100%;
    height: auto;
    margin: 8px auto;
  }

  .viz .grid {
    fill: none;
    stroke: #d9ddd7;
    stroke-width: 1;
  }

  .viz .axis {
    stroke: #c8cec9;
    stroke-width: 1;
  }

  .viz .shape {
    fill: #db5d3b38;
    stroke: var(--accent);
    stroke-width: 2;
  }

  .viz text {
    font-size: 10px;
    fill: var(--muted);
  }

  .viz .dot {
    fill: var(--accent);
    stroke: white;
    stroke-width: 2;
  }

  .bar-row {
    display: grid;
    grid-template-columns: 105px 1fr 30px;
    gap: 8px;
    align-items: center;
    margin: 10px 0;
    font-size: 12px;
  }

  .bar-track {
    height: 10px;
    border-radius: var(--radius-pill);
    overflow: hidden;
    background: #e7e5dc;
  }

  .bar-fill {
    height: 100%;
    border-radius: var(--radius-pill);
    background: linear-gradient(90deg, var(--green), #78a68d);
  }

  .saved {
    display: flex;
    gap: 9px;
    align-items: center;
    font-size: 13px;
    color: var(--green);
  }

  .saved:before {
    display: grid;
    place-items: center;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    font-weight: 900;
    background: var(--soft);
    content: "✓";
  }

  .contest {
    padding: 10px 0;
    border-bottom: 1px solid var(--hairline);
    line-height: 1.5;
  }

  .contest:last-child {
    border: 0;
  }

  .mode-grid {
    display: grid;
    gap: 14px;
    margin: 28px 0;
  }

  .mode-card {
    border: 1px solid var(--line);
    border-radius: 22px;
    padding: 20px;
    background: var(--card);
  }

  .mode-card h3 {
    font-size: 22px;
  }

  .mode-card p {
    line-height: 1.6;
    color: var(--muted);
  }

  .sort-row b {
    display: block;
    margin-bottom: 9px;
  }

  .sort-actions button {
    border: 1px solid var(--line);
    border-radius: 9px;
    padding: 8px 3px;
    font-size: 11px;
    background: transparent;
  }

  .sort-actions button.active {
    border-color: var(--green);
    background: var(--green);
    color: white;
  }

  /* ==== MaxDiff（4択比較） ==== */
  .maxdiff-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 9px;
    margin: 20px 0;
  }

  .maxdiff-item {
    border: 2px solid transparent;
    border-radius: 15px;
    padding: 15px;
    text-align: left;
    background: var(--card);
  }

  .maxdiff-item.best {
    border-color: var(--green);
    background: var(--soft);
  }

  .maxdiff-item.worst {
    border-color: var(--accent);
    background: #f8e9e3;
  }

  .trade-card ul {
    padding-left: 18px;
    font-size: 13px;
    line-height: 1.7;
    color: var(--muted);
  }

  .reflection {
    min-height: 150px;
    width: 100%;
    border: 1px solid var(--line);
    border-radius: 15px;
    padding: 15px;
    background: var(--card);
    resize: vertical;
  }

  .pair-card.chosen,
  .choice.chosen {
    border-color: var(--green);
    background: var(--soft);
    box-shadow: 0 0 0 2px var(--green);
  }

  .maxdiff-item {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .maxdiff-item b {
    font-size: 16px;
    line-height: 1.35;
  }

  .maxdiff-item span {
    font-size: 13px;
    line-height: 1.65;
  }

  .md-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 2px;
  }

  .md-btn {
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 11px 4px;
    min-height: 44px;
    font-size: 12.5px;
    font-weight: 700;
    background: var(--paper);
    color: var(--muted);
  }

  .md-btn.best.active {
    border-color: var(--green);
    background: var(--green);
    color: #fff;
  }

  .md-btn.worst.active {
    border-color: var(--accent);
    background: var(--accent);
    color: #fff;
  }

  .md-status {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin: 16px 0;
  }

  .md-status-item {
    flex: 1;
    min-width: 130px;
    border-radius: 12px;
    padding: 10px 12px;
    font-size: 12px;
    font-weight: 700;
    background: #eeece3;
    color: var(--muted);
  }

  .md-status-item.set {
    background: var(--soft);
    color: var(--green);
  }

  .md-warning {
    font-weight: 700;
    color: var(--accent);
  }

  .md-sticky {
    position: sticky;
    bottom: 0;
    padding: 16px 0 6px;
    margin-top: 8px;
    background: linear-gradient(to top, var(--paper) 65%, transparent);
  }

  details.panel summary {
    font-weight: 800;
    font-size: 18px;
    list-style: none;
    cursor: pointer;
  }

  details.panel summary::-webkit-details-marker {
    display: none;
  }

  details.panel summary:after {
    float: right;
    font-weight: 400;
    color: var(--muted);
    content: "▾";
  }

  details.panel[open] summary:after {
    content: "▴";
  }

  .reflection-q {
    display: block;
    margin-top: 16px;
    font-size: 13px;
    font-weight: 700;
  }

  .reflection-q .reflection {
    margin-top: 8px;
    min-height: 80px;
    font-weight: 400;
  }

  @media (max-width: 430px) {
    .maxdiff-grid {
      grid-template-columns: 1fr;
    }
  }

  /* v0.9.8 UI/UX polish (visual only, no logic changes) */
  :root {
    --primary: #245c46;
    --primary-dark: #193f30;
    --danger: #c9663d;
    --radius: 14px;
    --radius-lg: 20px;
    --radius-pill: 99px;
  }

  body {
    font-size: 16px;
    line-height: 1.7;
  }

  .app {
    max-width: 480px;
    padding-left: 20px;
    padding-right: 20px;
  }

  h1 {
    line-height: 1.15;
  }

  h2 {
    font-size: 26px;
  }

  h3 {
    font-size: 20px;
    line-height: 1.4;
  }

  .lead {
    margin-bottom: 28px;
  }

  .btn {
    border-radius: var(--radius);
    padding: 16px 22px;
    font-size: 16px;
  }

  .btn.primary {
    background: var(--primary);
    box-shadow: 0 8px 20px #245c4630;
  }

  .btn.primary:active {
    background: var(--primary-dark);
  }

  .btn.secondary {
    color: var(--primary);
  }

  .link {
    padding: 12px 4px;
    font-size: 13px;
  }

  .choice,
  .pair-card,
  .mode-card,
  .maxdiff-item,
  .history-item,
  .panel,
  .result-head {
    border-radius: var(--radius-lg);
  }

  .check {
    border-radius: var(--radius);
  }

  .panel {
    margin: 24px 0;
  }

  .mode-grid {
    gap: 18px;
    margin: 32px 0;
  }

  .mode-card {
    padding: 24px 22px;
  }

  .mode-card h3 {
    margin: 10px 0 8px;
  }

  .mode-card p {
    margin: 0 0 18px;
    color: var(--muted);
  }

  .mode-card .btn {
    width: 100%;
  }

  .time-badge {
    display: inline-block;
    padding: 5px 12px;
    border-radius: var(--radius-pill);
    font-size: 12px;
    font-weight: 800;
    background: var(--soft);
    color: var(--primary);
  }

  /* ==== 共通：プログレスバー ==== */
  .progress-shell {
    padding: 14px 0 4px;
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 8px;
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
  }

  .progress-label span:first-child {
    color: var(--ink);
  }

  .progress-label span:last-child {
    color: var(--primary);
  }

  .progress {
    height: 6px;
    border-radius: var(--radius-pill);
  }

  .progress > i {
    background: var(--primary);
  }

  .choice {
    padding: 20px;
  }

  .choice strong {
    font-size: 17px;
  }

  .pair-card {
    padding: 20px;
  }

  .pair-card:active {
    border-color: var(--primary);
  }

  .pair-card.chosen,
  .choice.chosen {
    border-color: var(--primary);
    box-shadow: 0 0 0 2px var(--primary);
  }

  .navrow {
    margin-top: 26px;
  }

  .maxdiff-grid {
    gap: 12px;
    margin: 24px 0 16px;
  }

  .maxdiff-item {
    padding: 18px;
    box-shadow: 0 3px 10px var(--shadow-soft);
  }

  .maxdiff-item.best {
    border-color: var(--primary);
    background: var(--soft);
  }

  .maxdiff-item.worst {
    border-color: var(--danger);
    background: #f7e9e1;
  }

  .md-btn {
    border-radius: 11px;
    padding: 12px 6px;
    min-height: 46px;
  }

  .md-btn.best.active {
    border-color: var(--primary);
    background: var(--primary);
  }

  .md-btn.worst.active {
    border-color: var(--danger);
    background: var(--danger);
  }

  .md-status-item.set {
    color: var(--primary);
  }

  .md-status {
    gap: 10px;
    margin: 18px 0;
  }

  .md-status-item {
    padding: 12px 14px;
    font-size: 12.5px;
  }

  .md-warning {
    color: var(--danger);
  }

  .md-sticky {
    padding: 18px 0 8px;
  }

  .result-head {
    padding: 28px 24px;
    margin-bottom: 20px;
  }

  .panel-positive {
    border-left: 4px solid var(--primary);
  }

  .panel-negative {
    border-left: 4px solid var(--danger);
  }

  .panel-positive h3:before {
    color: var(--primary);
    content: "↑ ";
  }

  .panel-negative h3:before {
    color: var(--danger);
    content: "↓ ";
  }

  .num {
    display: grid;
    place-items: center;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    font-size: 11px;
    font-weight: 900;
    background: var(--soft);
    color: var(--primary);
  }

  .bar-row {
    grid-template-columns: 26px 92px 1fr 30px;
    gap: 6px;
  }

  .bar-fill {

        playedCount: (S.scores.career && S.scores.career[x.id]?.played) || 0
      })),
      unplayed = pool
        .filter((x) => !x.playedCount)
        .sort((a, b) => b.affinityScore - a.affinityScore),
      anchors = pool
        .filter((x) => x.playedCount > 0)
        .sort((a, b) => b.affinityScore - a.affinityScore)
        .slice(0, 4),
      chosen = [...unplayed.slice(0, Math.max(8, size - anchors.length)), ...anchors];
    [...pool]
      .sort((a, b) => a.playedCount - b.playedCount)
      .forEach((x) => {
        if (chosen.length < 12 && !chosen.some((y) => y.id === x.id)) chosen.push(x);
      });
    return chosen.slice(0, size);
  }
  function maxDiffSets(count) {
    let pool =
        S.experienceMode === "explore_more"
          ? exploreMorePool(16)
          : cardSortCandidates(Math.min(28, Math.max(12, count + 8)), true),
      sets = [],
      used = new Set(S.maxDiffLogs.map((x) => [...x.candidates].sort().join("|")));
    for (let i = 0; sets.length < count && i < count * 4; i++) {
      let set = [
          pool[i % pool.length],
          pool[(i + 3) % pool.length],
          pool[(i + 7) % pool.length],
          pool[(i + 11) % pool.length]
        ],
        key = set
          .map((x) => x.label)
          .sort()
          .join("|");
      if (!used.has(key)) {
        sets.push(set);
        used.add(key);
      }
    }
    return sets;
  }
  function pairwisePairs(count) {
    let pool = careerPool(),
      ranked = ranking("career")
        .slice(0, Math.max(8, count))
        .map((x) => pool.find((y) => y.id === x.id))
        .filter(Boolean),
      q = [],
      used = new Set(S.pairwiseLogs.map((x) => pairKey(x.aId, x.bId)));
    for (let i = 0; i < ranked.length && q.length < count; i++)
      for (let j = i + 1; j < ranked.length && q.length < count; j++)
        if (!used.has(pairKey(ranked[i].id, ranked[j].id)))
          q.push([ranked[i], ranked[j], "pairwise"]);
    return q;
  }
  function tradeoffPairs(count) {
    let axes = [
      [
        "安定収入・組織所属・チーム",
        "収入変動・個人自律・自己決定",

      ],
      [
        "創作は少なめ・安定運用",
        "発信・創作が多い・変化も多い",

      ],

      ],

      ],

      ],
      [

      ]
    ];
    return Array.from({ length: count }, (_, i) => {
      let x = axes[i % axes.length];
      return [
        styleOption(`tradeA${i}`, "A", x[0], x[2]),
        styleOption(`tradeB${i}`, "B", x[1], x[3]),
        "tradeoff"
      ];
    });
  }
  function headToHead(a, b, p) {
    let wins = {};
    S.logs
      .filter(
        (x) =>
          bucketFor(x.phase) === bucketFor(p) &&
          ((x.aId === a && x.bId === b) || (x.aId === b && x.bId === a))
      )
      .forEach((x) => {
        let id = x.answer === "a" ? x.aId : x.answer === "b" ? x.bId : null;
        if (id) wins[id] = (wins[id] || 0) + 1;
      });
    return (wins[a] || 0) === (wins[b] || 0) ? null : (wins[a] || 0) > (wins[b] || 0) ? a : b;
  }
  function ranking(p) {
    let stats = Object.values(S.scores[bucketFor(p)] || {}).map((x) => finalizeStat({ ...x }));
    stats.sort(
      (a, b) =>
        b.displayScore - a.displayScore ||
        b.confidence - a.confidence ||
        b.wins - a.wins ||
        (headToHead(a.id, b.id, p) === a.id
          ? -1
          : headToHead(a.id, b.id, p) === b.id
            ? 1
            : a.label.localeCompare(b.label, "ja"))
    );
    return stats;
  }
  function topIds(p, n) {
    return (S.rankings[p] || ranking(p)).slice(0, n).map((x) => x.id);
  }
  function getRank(r, p) {
    let ranks = r.rankings || {};
    if (p === "career")
      return (
        ranks.overall ||
        [...(ranks.jobTypes || ranks.job || []), ...(ranks.soloGenres || ranks.solo || [])].sort(
          (a, b) => (b.score || 0) - (a.score || 0)
        )
      );
    if (p === "workStyle") return ranks.workStyles || ranks.style || ranks.soloStyles || [];
    return ranks[p] || [];
  }
  function branchOf(r) {
    return (
      r.career_branch ||
      (r.mode === "company" || r.mode === "solo"
        ? r.mode
        : r.career_mode && ["company_employee", "public_org"].includes(r.career_mode.id)
          ? "company"
          : "solo")
    );
  }
  function scoreCandidates(r) {
    let traits = r.userTraits || freshTraits(),
      stats = (r.candidateStats && r.candidateStats.career) || [],
      byId = Object.fromEntries(stats.map((x) => [x.id, finalizeStat({ ...x })]));
    return careerPool(false) // 結果表示は現在の絞り込み状態に関わらず全候補から集計する
      .map((item) => {
        let stat = byId[item.id] || emptyStat(item),
          affinity = affinityFor(item, traits),
          visualScore = stat.displayScore;
        return { ...item, ...stat, visualScore, affinity };
      })
      .sort((a, b) => b.visualScore - a.visualScore || b.confidence - a.confidence);
  }
  function insightFor(r) {
    let traits = r.userTraits || freshTraits(),
      displayTraits = r.displayTraits || normalizeTraitScores(traits, r.question_count || 1),
      scored = scoreCandidates(r),
      company = scored.filter((x) => x.domain === "company").slice(0, TOP_N_DISPLAY),
      individual = scored.filter((x) => x.domain === "individual").slice(0, TOP_N_DISPLAY),
      creative = scored
        .filter((x) => /music|illustration|video|writing|photo|design|content|handmade/.test(x.id))
        .slice(0, TOP_N_DISPLAY),
      overall = scored.filter((x) => x.played).slice(0, TOP_N_DISPLAY),
      unexplored = scored
        .filter((x) => !x.played)
        .sort((a, b) => b.affinity - a.affinity)
        .slice(0, UNEXPLORED_DISPLAY_COUNT),
      topTraits = Object.entries(displayTraits)
        .sort((a, b) => b[1] - a[1])
        .slice(0, TRAIT_RADAR_COUNT)
        .map(([id, score]) => ({ id, label: traitLabels[id], score })),
      avoidLeaning = scored
        .filter((x) => (x.worstCount || 0) > 0)
        .sort((a, b) => b.worstCount - a.worstCount || a.displayScore - b.displayScore)
        .slice(0, AVOID_LEANING_COUNT),
      misfitEnvironments = Object.entries(displayTraits)
        .sort((a, b) => a[1] - b[1])
        .slice(0, MISFIT_DISPLAY_COUNT)
        .map(([id, score]) => ({ id, label: traitLabels[id], score, hint: traitMisfitHints[id] })),
      logs = r.comparisonLogs || [],
      close = [];
    for (let i = 0; i < overall.length - 1; i++)
      if (Math.abs(overall[i].displayScore - overall[i + 1].displayScore) <= CLOSE_CONTEST_GAP)
        close.push(`${overall[i].label}と${overall[i + 1].label}が接戦です`);
    let both = logs.filter((x) => x.answer === "both").slice(-2),
      unknown = logs.filter((x) => x.answer === "unknown").slice(-2);
    both.forEach((x) => close.push(`${x.a}と${x.b}は「どちらもあり」でした`));
    unknown.forEach((x) => close.push(`${x.a}と${x.b}は、まだ判断材料が不足しています`));
    if (!close.length)
      close.push("上位候補と未探索候補を追加で比べると、判断軸がより明確になります");
    let mapItems = [...overall, ...unexplored].slice(0, MAP_POINT_COUNT),
      points = mapItems.map((x) => {
        let w = x.trait_weights || {},
          px = (w.autonomy || 0) - (w.team_support || 0),
          py = (w.creativity || 0) + (w.risk_tolerance || 0) - (w.stability || 0);
        return {
          id: x.id,
          label: x.label,
          x: Math.max(-1, Math.min(1, px / 1.2)),
          y: Math.max(-1, Math.min(1, py / 1.8)),
          domain: x.domain
        };
      }),
      possibilityMap = {
        company: company.map((x) => x.label),
        individual: individual.map((x) => x.label),
        creative: creative.map((x) => x.label),
        points
      },
      lean = points.length
        ? `可能性マップでは${points.reduce((n, x) => n + x.x, 0) >= 0 ? "個人自律" : "組織所属"}側、${points.reduce((n, x) => n + x.y, 0) >= 0 ? "創作・挑戦" : "安定運用"}側への反応がやや見られます`
        : "回答数が少ないため方向性は未確定です";
    return {
      overall,
      company,
      individual,
      creative,
      topTraits,
      unexplored,
      avoidLeaning,
      misfitEnvironments,
      closeContests: close.slice(0, TOP_N_DISPLAY),
      possibilityMap,
      lean,
      actions: [
        `「${(overall[0] || company[0]).label}」に近い人へ30分話を聞く`,
        `「${(individual[0] || { label: "気になる個人活動" }).label}」を1日だけ試す`,
        `${unexplored.map((x) => x.label).join("・")}を各15分調べる`,
        "AIプロンプトで追加比較すべき問いを出してもらう"
      ]
    };
  }

  // ==== 判断軸メタ分析（v1.4.0）：接戦ペアワイズの理由タグを集計する ====
  function reasonTagSummary(r) {
    let counts = {};
    (r.pairwiseLogs || []).forEach((x) => {
      if (x.reason_tag) counts[x.reason_tag] = (counts[x.reason_tag] || 0) + 1;
    });
    let total = Object.values(counts).reduce((n, x) => n + x, 0),
      ranked = REASON_TAGS.filter((t) => counts[t.id]).sort((a, b) => counts[b.id] - counts[a.id]),
      top = ranked.slice(0, 2).map((t) => ({ id: t.id, label: t.label, count: counts[t.id] })),
      unchosen = REASON_TAGS.filter((t) => !counts[t.id]).map((t) => t.label);
    return { counts, total, top, unchosen };
  }
  // ==== 時系列比較（v1.4.0）：直前の記録との順位変動 ====
  function previousRecordOf(r) {
    let list = history(),
      idx = list.findIndex((x) => x.id === r.id);
    if (idx >= 0) return list[idx + 1] || null;
    return list.find((x) => new Date(x.created_at) < new Date(r.created_at)) || null;
  }
  function rankComparison(r, prev) {
    if (!prev) return null;
    let cur = getRank(r, "career").slice(0, RANK_COMPARE_COUNT),
      prevRanks = getRank(prev, "career");
    if (!cur.length || !prevRanks.length) return null;
    let rows = cur.map((x, i) => {
        let pi = prevRanks.findIndex((y) => y.id === x.id);
        return {
          id: x.id,
          label: x.label,
          rank: i + 1,
          prevRank: pi >= 0 ? pi + 1 : null,
          delta: pi >= 0 ? pi - i : null // 正の値=順位が上がった
        };
      }),
      riser = rows.filter((x) => (x.delta || 0) > 0).sort((a, b) => b.delta - a.delta)[0] || null,
      days = Math.max(
        1,
        Math.round((new Date(r.created_at) - new Date(prev.created_at)) / 86400000)
      ),
      when = days >= 60 ? `${Math.round(days / 30)}ヶ月` : days >= 14 ? `${Math.round(days / 7)}週間` : `${days}日`,
      curTags = r.reason_tag_summary || reasonTagSummary(r),
      prevTags = prev.reason_tag_summary || reasonTagSummary(prev),
      tagChange = null;
    if (curTags.total >= REASON_TAG_MIN_COUNT && prevTags.total >= REASON_TAG_MIN_COUNT) {
      let curTop = curTags.top[0],
        prevTop = prevTags.top[0];
      if (curTop && prevTop)
        tagChange =
          curTop.id === prevTop.id
            ? `接戦で選ぶ軸は前回と同じく『${curTop.label}』が中心です。`
            : `接戦で選ぶ軸が『${prevTop.label}』中心から『${curTop.label}』中心に変わっています。`;
    }
    return { rows, riser, when, tagChange, sameMode: r.mode === prev.mode };
  }

  // ==================================================================
  // 4. STATE — セッション状態・保存・復元
  // ==================================================================
  // localStorageアクセスの一元化（容量超過やプライベートモードでの例外を握りつぶす）
  const HISTORY_KEY = "careerPairwiseLabHistory";
  function storageGet(key) {
    try {
      return localStorage.getItem(key);
    } catch {
      return null;
    }
  }
  function storageSet(key, value) {
    try {
      localStorage.setItem(key, value);
    } catch {}

  function storageRemove(key) {

    } catch {}
  }
  // 回答ログは全てS.logsに集約される。S.anchorAnswers/S.pairwiseLogs/S.tradeoffLogsなどの
  // フェーズ別配列も同じログオブジェクトを保持しており、フェーズ単位でのスコア再計算に使う。
  // 過去に存在したS.tieLogs等の廃止済み配列は参照しないこと（再導入すると初回回答時に
  // クラッシュした実績がある）。S.cardSortLogsはv0.9.5以前に保存された履歴のスコア再計算
  // 互換のためだけに残しており、カード仕分け画面自体は現行フローには存在しない。
  function freshState() {
    return {
      view: "home",
      status: null,
      career: null,
      desiredCareerModes: [],
      scopeFilter: { industryIds: [], roleIds: [] },

      answerTrail: [],
      navigationStack: [],
      editingAnswer: null,
      rankings: {},
      avoid: [],
      userTraits: freshTraits(),
      questionCount: 0,
      isEarlyResult: false
    };

  let S = freshState();
  // 過去の結果レコードから、回答ログを引き継いだ追加分析用の状態を作る
  function stateFromRecord(r, branch, desired) {
    return {
      status: r.user_status?.id || null,
      career: desired[0]?.id || null,
      desiredCareerModes: desired.map((x) => x.id),

      reflectionAnswers: [...(r.reflectionAnswers || [])],
      answerTrail: [],
      navigationStack: [],

      avoid: (r.avoidFactors || [])
        .map((name) => (branch === "company" ? D.avoid : D.risk).find((x) => x.label === name)?.id)
        .filter(Boolean),

  }
  const label = (list, id) => (list.find((x) => x.id === id) || {}).label || id;
  function desiredModesOf(session) {
    let value = session.desired_career_modes || (session.career_mode ? [session.career_mode] : []);
    return value
      .map((x) =>
        typeof x === "string"
          ? DESIRED_CAREER_MODES.find((m) => m.id === x) || { id: x, label: x }
          : x
      )
      .filter(Boolean);
  }
  // 旧履歴（exploration_filtersを持たない記録）を開いた場合は広め設定として扱う。
  function explorationFiltersOf(session) {
    let f = (session && session.exploration_filters) || {};
    return {
      industryIds: f.industry_ids || [],
      roleIds: f.role_ids || [],
      strength: f.strength || "broad"
    };
  }
  function history() {
    try {
      let value = JSON.parse(storageGet(HISTORY_KEY));
      return Array.isArray(value) ? value.filter((x) => x && typeof x === "object" && x.id) : [];
    } catch {
      storageRemove(HISTORY_KEY);
      return [];
    }
  }
  function saveHistoryList(list) {
    storageSet(HISTORY_KEY, JSON.stringify(list));
  }
  function save(r) {
    let h = history();
    h.unshift(r);
    saveHistoryList(h.slice(0, MAX_HISTORY));
  }
  const SESSION_KEY = "careerPairwiseLabSession";
  function saveSession() {
    if (!S.phase) return;
    storageSet(SESSION_KEY, JSON.stringify({ saved_at: new Date().toISOString(), state: S }));
  }
  function clearSession() {
    storageRemove(SESSION_KEY);
  }
  function loadSession() {
    try {
      let value = JSON.parse(storageGet(SESSION_KEY));
      return value && value.state && value.state.phase ? value : null;
    } catch {
      storageRemove(SESSION_KEY);
      return null;
    }
  }
  function resumeSession() {
    let sess = loadSession();
    if (!sess) {
      home();
      return;
    }
    S = sess.state;
    recalculateAllScores();
    if (["avoid", "risk"].includes(S.phase)) checks(candidates(S.phase));
    else if (["maxDiff", "additionalMaxDiff"].includes(S.phase))
      S.index < S.queue.length ? maxDiffScreen() : finishPhase();
    else S.index < S.queue.length ? pair() : finishPhase();
  }


  // ==================================================================
  // 5. SCREENS — 画面レンダリング（画面ごとに1関数）
  // ==================================================================
  function copy(t) {
    if (navigator.clipboard && isSecureContext)
      navigator.clipboard
        .writeText(t)
        .then(() => toast("コピーしました"))
        .catch(() => fallback(t));
    else fallback(t);
  }
  function fallback(t) {
    let a = document.createElement("textarea");
    a.value = t;
    document.body.append(a);
    a.select();
    document.execCommand("copy");
    a.remove();
    toast("コピーしました");
  }
  function toast(msg) {
    let t = $("#toast");
    if (msg) t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), TOAST_DURATION_MS);
  }
  function esc(s) {
    return String(s).replace(
      /[&<>"']/g,
      (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[c]
    );
  }

  function screen(html) {
    root.innerHTML = `<section class="screen">${html}</section>`;

  function progress(extra) {
    let p = extra ?? S.questionCount / TIME_BUDGET_CONFIG.maxTotalQuestions;
    let shell = $(".progress-shell");

    $(".progress i").style.width = `${Math.min(1, p) * 100}%`;
    let phaseEl = $("#progressPhase"),
      countEl = $("#progressCount");

      countEl.textContent = remain ? `あと目安${remain}問` : "";
    } else {

      countEl.textContent = "";
    }
  }
  function phaseProgressBar() {

      current = Math.min(S.index + 1, total),
      pct = Math.round((S.index / total) * 100);
    return `<div class="progress-shell"><div class="progress-label"><span>現在 ${current}問目 / 全${total}問</span><span>${pct}%</span></div><div class="progress"><i style="width:${Math.min(100, pct)}%"></i></div></div>`;
  }
  function modeLabelOf(mode) {

      ? "標準版"
      : mode === "deep_continuation"
        ? "標準版 → がっつり版"
        : mode === "explore_more"

            ? "がっつり版"
            : "旧版";

  const names = {
    anchor: "アンカー質問",
    maxDiff: "MaxDiff",
    additionalMaxDiff: "追加MaxDiff",
    pairwise: "接戦ペアワイズ",

    tradeoff: "トレードオフ比較",
    avoid: "避けたい要素",
    risk: "個人活動リスク",
    reflection: "内省質問"
  };
  const intros = {
    anchor: [
      "01",
      "アンカー質問",
      "まずは、働き方や価値観の初期傾向を見ます。",
      "実現可能性ではなく、今どちらに惹かれるかで選んでください。"
    ],
    maxDiff: [

  function pushTrail(entry) {

  function removeLastMatching(array, predicate) {

      );

        removeLastMatching(S.anchorAnswers, (x) => x.questionKey === entry.payload.questionKey);

  function startPhase(phase) {

    S.selected[phase] = list;
    if (phase !== "tradeoff") ensureStats("career", list);
    pair();
  }
  function answer(ans, a, b, kind, reasonTag) {
    let log = {
      type: kind,
      questionKey: `${S.phase}_${S.index}`,
      phase: S.phase,
      aId: a.id,
      bId: b.id,
      a: a.label,
      b: b.label,
      aDescription: a.description,
      bDescription: b.description,
      aTraits: a.trait_weights || {},
      bTraits: b.trait_weights || {},
      answer: ans,
      reason_tag: reasonTag || null,
      comparisonType: kind
    };
    S.logs.push(log);
    if (S.phase === "anchor") S.anchorAnswers.push(log);
    if (["pairwise", "closePairwise"].includes(S.phase)) S.pairwiseLogs.push(log);
    if (S.phase === "tradeoff") S.tradeoffLogs.push(log);
    pushTrail({ type: "pair", phase: S.phase, index: S.index, payload: log });
    recalculateAllScores();
    S.questionCount++;
    S.index++;
    S.editingAnswer = null;
    if (S.questionCount >= activeConfig().maxAnswers) {
      transition(
        S.experienceMode === "standard" || S.experienceMode === "deep"
          ? S.mode === "company"
            ? "avoid"
            : "risk"
          : phases()[phases().length - 1]
      );
    } else if (S.index < S.queue.length) pair();
    else finishPhase();
  }
  function earlyResult() {
    S.isEarlyResult = true;
    transition(
      ["deep_continuation", "explore_more"].includes(S.experienceMode)
        ? "result"
        : S.mode === "company"
          ? "avoid"
          : "risk"
    );
  }
  function finishPhase() {
    S.rankings[bucketFor(S.phase)] = ranking(S.phase);
    let i = phases().indexOf(S.phase);
    if (i < phases().length - 1) transition(phases()[i + 1]);
    else transition("result");
  }
  function complete() {
    let rec = record();
    save(rec);
    clearSession();
    showResult(rec);
  }
  function reset() {
    if (S.view !== "home" && !confirm("入力中の内容を消して最初からやり直しますか？")) return;
    clearSession();
    S = freshState();
    document
      .querySelectorAll(".tab")
      .forEach((x) => x.classList.toggle("active", x.dataset.tab === "app"));
    home();
  }
  function startContinuation(r) {
    let branch = r.career_branch || branchOf(r),
      desired = desiredModesOf(r);
    S = {
      ...S,
      ...stateFromRecord(r, branch, desired),
      view: "continuation",
      experienceMode: "deep_continuation"
    };
    recalculateAllScores();
    continuationIntro(r);
  }
  // 結果画面から未探索候補だけを4択で追加比較する小ループ（v1.1）
  function startUnexploredRound(r) {
    let branch = r.career_branch || branchOf(r),
      desired = desiredModesOf(r);
    S = {
      ...S,
      ...stateFromRecord(r, branch, desired),
      view: "exploreMore",
      experienceMode: "explore_more"
    };
    recalculateAllScores();
    transition("additionalMaxDiff");
  }

  // ==================================================================
  // 7. EXPORT / IMPORT — 履歴レコード・AIプロンプト・共有テキスト
  // ==================================================================
  function record() {
    recalculateAllScores();
    let now = new Date().toISOString(),
      status = { id: S.status, label: label(D.status, S.status) },
      desired = S.desiredCareerModes
        .map((id) => DESIRED_CAREER_MODES.find((x) => x.id === id))
        .filter(Boolean),
      overall = ranking("career"),
      candidateStats = {
        career: Object.values(S.scores.career || {}).map((x) => finalizeStat({ ...x }))
      },
      completion =
        S.experienceMode === "standard"
          ? "standard_completed"
          : S.experienceMode === "explore_more"
            ? "explore_more_completed"
            : "deep_completed",
      displayTraits = normalizeTraitScores(S.userTraits, S.questionCount);
    let base = {
      id: String(Date.now()),
      created_at: now,
      updated_at: now,
      version: "1.6.0",
      mode: S.experienceMode,
      status: completion,
      source_session_id: S.sourceSessionId,
      user_status: status,
      desired_career_modes: desired,
      exploration_filters: {
        industry_ids: [...(S.explorationFilters?.industryIds || [])],
        role_ids: [...(S.explorationFilters?.roleIds || [])],
        strength: S.explorationFilters?.strength || "broad"
      },
      career_mode: null,
      career_branch: S.mode,
      anchorAnswers: S.anchorAnswers,
      cardSortLogs: S.cardSortLogs,
      maxDiffLogs: S.maxDiffLogs,
      pairwiseLogs: S.pairwiseLogs,
      tradeoffLogs: S.tradeoffLogs,
      reflectionAnswers: S.reflectionAnswers,
      avoidFactors: S.avoid.map((id) => label(S.mode === "company" ? D.avoid : D.risk, id)),
      candidateStats,
      userTraits: { ...S.userTraits },
      rawTraitScores: { ...S.userTraits },
      displayTraits,
      rankings: { overall },
      comparisonLogs: S.logs,
      question_count: S.questionCount,
      is_early_result: S.isEarlyResult
    };
    let insight = insightFor(base);
    base.possibilityMap = insight.possibilityMap;
    base.closeContests = insight.closeContests;
    base.unexploredCandidates = insight.unexplored;
    base.resultSummary = {
      mode: activeConfig().label,
      lean: insight.lean,
      desiredCareerModes: desired.map((x) => x.label),
      topCandidates: insight.overall.slice(0, TOP_N_DISPLAY).map((x) => x.label),
      topTraits: insight.topTraits.slice(0, TOP_N_DISPLAY).map((x) => x.label)
    };
    base.insights = insight;
    base.reason_tag_summary = reasonTagSummary(base);
    base.aiPrompt = promptFor(base);
    return base;
  }
  function promptFor(r) {
    let insight = r.insights || insightFor(r),
      deep = r.mode !== "standard",
      desired =
        desiredModesOf(r)
          .map((x) => x.label)
          .join("、") || "未設定",
      filters = explorationFiltersOf(r),
      industryLabels =
        filters.industryIds
          .map((id) => INDUSTRY_FILTERS.find((x) => x.id === id)?.label)
          .filter(Boolean)
          .join("、") || "指定なし",
      roleLabels =
        filters.roleIds
          .map((id) => ROLE_FILTERS.find((x) => x.id === id)?.label)
          .filter(Boolean)
          .join("、") || "指定なし",
      strengthLabel =
        FILTER_STRENGTH_OPTIONS.find((x) => x.id === filters.strength)?.label || "広めに見る",
      maxdiff =
        (r.maxDiffLogs || [])
          .slice(-8)
          .map((x) => `${x.best} > ${x.neutral_ids?.length || 0}候補 > ${x.worst}`)
          .join(" / ") || "なし",
      pairs =
        (r.pairwiseLogs || [])
          .slice(-8)
          .map((x) => `${x.a} vs ${x.b}: ${x.answer}`)
          .join(" / ") || "なし",
      fmt = (list) =>
        list
          .slice(0, TOP_N_DISPLAY)
          .map(
            (x, i) =>
              `${i + 1}. ${x.label}: displayScore ${x.displayScore} / 比較${x.played} / 信頼度${getConfidenceLabel(x.confidence)} / Best ${x.bestCount || 0} / Worst ${x.worstCount || 0}`
          )
          .join("\n"),
      reasonTags =
        (r.pairwiseLogs || [])
          .filter((x) => x.reason_tag)
          .map(
            (x) =>
              `- ${x.answer === "a" ? x.a : x.b}（vs ${x.answer === "a" ? x.b : x.a}）: ${REASON_TAGS.find((t) => t.id === x.reason_tag)?.label || x.reason_tag}`
          )
          .join("\n") || "なし",
      reflection =
        (r.reflectionAnswers || [])
          .filter((x) => x.answer)
          .map((x) => `- ${x.text}: ${x.answer}`)
          .join("\n") || "なし",
      tradeoffs =
        (r.tradeoffLogs || [])
          .map((x) => `- ${x.aDescription} / ${x.bDescription}: ${x.answer}`)
          .join("\n") || "なし",
      low = scoreCandidates(r)
        .filter((x) => x.confidence < CONFIDENCE_MID)
        .slice(0, TOP_N_DISPLAY)
        .map((x) => x.label)
        .join("、"),
      axisSummary = r.reason_tag_summary || reasonTagSummary(r),
      axisText =
        axisSummary.total >= REASON_TAG_MIN_COUNT
          ? `繰り返し選んだ軸: ${axisSummary.top.map((t) => `${t.label}${t.count}回`).join("、")} / 一度も選ばなかった軸: ${axisSummary.unchosen.join("、") || "なし"}`
          : "タグ回答が少ないため未集計",
      f = r.falsification_check,
      falsificationText = f
        ? `1位候補「${f.target_label}」について / 合わないとしたらの仮説: ${f.weakness.label}${f.decisive ? ` / 「${f.runner_up_label || "2位候補"}」ではなく選ぶ決め手: ${f.decisive.label}` : ""} / まだ調べていないこと: ${f.unexplored_topics.length ? f.unexplored_topics.join("、") : "なし"}`
        : "未実施";
    return `現在地: ${r.user_status?.label || "不明"}\n希望する・気になるキャリア形態: ${desired}\n業界・業種フィルター: ${industryLabels}\n職種フィルター: ${roleLabels}\n探索の広さ: ${strengthLabel}\nこれらは候補除外ではなく、MaxDiff候補セットの配合を調整する探索設定として使用しています。\nMaxDiff結果: ${maxdiff}\n接戦ペアワイズ結果: ${pairs}\n\nこれは${deep ? "がっつり版" : "標準版"}の探索型キャリア比較ログです。${r.mode === "deep_continuation" ? "標準版の回答を引き継いだ追加分析です。" : ""}スコアは確定値ではなく探索用の推定値です。\n\n回答数: ${r.question_count}\ntrait上位: ${insight.topTraits.map((x) => `${x.label} ${x.score}`).join("、")}\n可能性マップ: ${insight.lean}\n総合候補:\n${fmt(insight.overall)}\n会社員寄り:\n${fmt(insight.company)}\n個人活動寄り:\n${fmt(insight.individual)}\n創作・副業寄り:\n${fmt(insight.creative)}\n接戦・迷い: ${insight.closeContests.join(" / ")}\n信頼度が低い候補: ${low}\n未探索: ${insight.unexplored.map((x) => x.label).join("、")}\n今は距離を感じている候補（仮説）: ${insight.avoidLeaning.map((x) => `${x.label}(Worst${x.worstCount || 0}回)`).join("、") || "該当なし"}\nフィットしにくいかもしれない環境（仮説）: ${insight.misfitEnvironments.map((x) => `${x.hint}（関連傾向:${x.label}）`).join("、")}\n避けたい要素: ${(r.avoidFactors || []).join("、") || "未選択"}\n接戦比較で選んだ理由タグ:\n${reasonTags}\n判断軸メタ分析（理由タグ集計）: ${axisText}\nトレードオフ回答:\n${tradeoffs}\n内省回答:\n${reflection}\n反証チェック: ${falsificationText}\n\n値を断定せず、迷いの構造と反証すべき問いを示してください。信頼度の低い候補から追加で比較すべき組み合わせ、話を聞く相手、小さく試す行動を提案してください。距離を感じている候補や環境についても、決めつけずに仮説として深掘りする問いを含めてください。`;
  }
  // ==== 求人票照合プロンプト（v1.5.0）====
  function jobPostingPrompt(r) {
    let insight = r.insights || insightFor(r),
      top =
        insight.overall
          .slice(0, TOP_N_DISPLAY)
          .map((x, i) => `${i + 1}. ${x.label}（スコア${x.displayScore}）`)
          .join("\n") || "（比較データなし）",
      axisSummary = r.reason_tag_summary || reasonTagSummary(r),
      axis =
        axisSummary.total >= REASON_TAG_MIN_COUNT
          ? axisSummary.top.map((t) => `${t.label}（${t.count}回）`).join("、")
          : "未集計",
      branch = branchOf(r),
      list = branch === "company" ? D.avoid : D.risk,
      avoidLines =
        (r.avoidFactors || r.avoid_factors || [])
          .map((label) => {
            let item = list.find((x) => x.label === label),
              q = item && AVOID_CHECK_QUESTIONS[item.id];
            return q ? `- ${label}（確認したい問い: ${q.check} / ${q.ask}）` : `- ${label}`;
          })
          .join("\n") || "- 未選択",
      desired =
        desiredModesOf(r)
          .map((x) => x.label)
          .join("、") || "未設定";
    return `以下は、キャリア探索ツール「キャリア比較ラボ」でのユーザーの自己分析サマリーです。\n\n現在地: ${r.user_status?.label || "不明"}\n希望する・気になるキャリア形態: ${desired}\n関心が寄っている候補TOP${TOP_N_DISPLAY}:\n${top}\n接戦で繰り返し選んだ判断軸: ${axis}\n避けたい要素:\n${avoidLines}\n\nこの後にユーザーが貼る求人票（または案件・募集要項）を、上記の診断結果と照合してください。特に避けたい要素との矛盾の可能性、記載が無く面接で確認すべき点を、断定せずに指摘してください。企業を批判せず、ユーザーが確認すべき問いのリストとして出力してください。`;
  }
  function shareText(insight) {
    let top3 = insight.overall
        .slice(0, 3)
        .map((x, i) => `${i + 1}. ${x.label}（${x.displayScore}点）`)
        .join("\n"),
      traits3 = insight.topTraits
        .slice(0, 3)
        .map((x, i) => `${i + 1}. ${x.label}（${x.score}点）`)
        .join("\n");
    return `【キャリア比較ラボ 結果】\n\n■ 候補TOP3\n${top3}\n\n■ 傾向TOP3\n${traits3}`;
  }
  function downloadText(filename, text) {
    let blob = new Blob([text], { type: "text/plain;charset=utf-8" }),
      url = URL.createObjectURL(blob),
      a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.append(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }
  function resultDownloadText(r, insight) {
    let candidates = insight.overall
        .slice(0, TOP_N_DISPLAY)
        .map((x, i) => `${i + 1}. ${x.label}（${x.displayScore}点 / 比較${x.played}回）`)
        .join("\n"),
      traits = insight.topTraits
        .map((x, i) => `${i + 1}. ${x.label}（${x.score}点）`)
        .join("\n"),
      prompt = r.aiPrompt || r.ai_prompt || "";
    return `キャリア比較ラボ 結果メモ（v1.6.0）\n作成日時: ${new Date(r.created_at || Date.now()).toLocaleString("ja-JP")}\n\n■ 候補TOP${TOP_N_DISPLAY}\n${candidates}\n\n■ 傾向TOP${insight.topTraits.length}\n${traits}\n\n■ AIプロンプト\n${prompt}\n`;
  }

  // ==================================================================
  // 8. BOOT — 初期化
  // ==================================================================
  document
    .querySelectorAll(".tab")
    .forEach((t) => (t.onclick = () => (t.dataset.tab === "history" ? showHistory() : reset())));
  home();
  // PWA（v1.6.0）：Service Worker登録。プログレッシブエンハンスメントとして実装しており、
  // file://での直開き・sw.jsが無い単体配布・未対応ブラウザでは何もせず全機能がそのまま動く。
  function showUpdateToast(reg) {
    let t = $("#toast");
    if (!t) return;
    t.textContent = "新しいバージョンがあります（タップで更新）";
    t.classList.add("show", "toast-action");
    t.onclick = () => {
      if (reg.waiting) reg.waiting.postMessage("SKIP_WAITING");
      t.classList.remove("show", "toast-action");
      t.onclick = null;
    };
  }
  if (
    typeof navigator !== "undefined" &&
    "serviceWorker" in navigator &&
    typeof location !== "undefined" &&
    location.protocol.indexOf("http") === 0
  ) {
    window.addEventListener("load", () => {
      navigator.serviceWorker
        .register("sw.js")
        .then((reg) => {
          if (reg.waiting && navigator.serviceWorker.controller) showUpdateToast(reg);
          reg.addEventListener("updatefound", () => {
            let sw = reg.installing;
            if (!sw) return;
            sw.addEventListener("statechange", () => {
              if (sw.state === "installed" && navigator.serviceWorker.controller)
                showUpdateToast(reg);
            });
          });
        })
        .catch(() => {});
      let refreshed = false;
      navigator.serviceWorker.addEventListener("controllerchange", () => {
        if (refreshed) return;
        refreshed = true;
        location.reload();
      });
    });
  }
})();
</script></body></html>
