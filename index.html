<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#1E3A50">
  <!-- PWA（v1.6.0）：manifest/sw.jsが無い環境（index.html単体配布）でも全機能が動作する -->
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&display=swap" rel="stylesheet">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="icon" type="image/png" href="icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="キャリア比較">
  <title>キャリア比較ラボ v2.1.0</title>
  <style>
  /* ==== ベース：カラーパレット・リセット ==== */
  :root {
    /* ==== 海図と航路パレット（この10色以外を追加しない） ==== */
    --paper: #F6F2E9; /* 背景。古地図の紙 */
    --paper-raised: #FDFBF5; /* カード面 */
    --ink: #1E3A50; /* 主要テキスト・線。海図のインク */
    --ink-soft: #5A7184; /* 補助テキスト */
    --ink-faint: #9FB0BC; /* 注記・プレースホルダー・罫線 */
    --course: #2E6E8E; /* 主要アクション・進捗・選択。航路の青 */
    --compass: #C4553B; /* アクセント。1画面1箇所まで */
    --brass: #A8854F; /* 計器系（信頼度・スコア）のみ */
    --shallow: #B0413E; /* 浅瀬（避けたい要素）系のみ */
    --line: #D9D2C3; /* ボーダー・区切り線 */
    /* ==== タイポグラフィ ==== */
    --font-display: "Shippori Mincho", "Hiragino Mincho ProN", "Yu Mincho", serif;
    --font-body: -apple-system, "Hiragino Sans", "Noto Sans JP", sans-serif;
    --font-mono: "Courier New", monospace;
    /* 旧トークン名の別名（既存セレクタ互換） */
    --muted: var(--ink-soft);
    --card: var(--paper-raised);
    --accent: var(--compass);
    --green: var(--course);
    --soft: rgba(46, 110, 142, 0.08);
    --hairline: rgba(30, 58, 80, 0.1);
  }

  * {
    box-sizing: border-box;
  }

  html {
    background: var(--ink);
  }

  body {
    margin: 0;
    min-height: 100svh;
    font-family: var(--font-body);
    font-size: 14px;
    color: var(--ink);
    background: var(--paper);
  }

  button,
  input,
  textarea {
    font: inherit;
  }

  button {
    cursor: pointer;
  }

  .app {
    max-width: 720px;
    margin: auto;
    min-height: 100svh;
    padding: env(safe-area-inset-top) 18px env(safe-area-inset-bottom);
    background: var(--paper);
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
  }

  .brand {
    font-weight: 850;
    letter-spacing: -0.04em;
  }

  .brand small {
    display: block;
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--green);
  }

  .tabs {
    display: flex;
    border-radius: 4px;
    padding: 3px;
    background: rgba(30, 58, 80, 0.06);
  }

  .tab {
    border: 0;
    padding: 8px 12px;
    border-radius: 4px;
    font-size: 13px;
    background: transparent;
    color: var(--muted);
  }

  .tab.active {
    background: var(--card);
    color: var(--ink);
  }

  .progress {
    height: 4px;
    border-radius: var(--radius-pill);
    overflow: hidden;
    background: var(--line);
  }

  .progress > i {
    display: block;
    height: 100%;
    background: var(--accent);
    transition: width 0.3s;
  }

  .screen {
    padding: 44px 0 110px;
  }

  .eyebrow {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--green);
  }

  .hero {
    padding-top: 56px;
  }

  h1 {
    margin: 12px 0 20px;
    font-family: var(--font-display);
    font-size: clamp(34px, 10vw, 58px);
    line-height: 1.05;
    letter-spacing: -0.055em;
  }

  h2 {
    margin: 8px 0;
    font-family: var(--font-display);
    font-size: 27px;
    line-height: 1.25;
    letter-spacing: -0.035em;
  }

  h3 {
    margin: 0 0 10px;
    font-family: var(--font-display);
    font-size: 18px;
  }

  .lead {
    margin-bottom: 34px;
    font-size: 16px;
    line-height: 1.8;
    color: var(--muted);
  }

  .btn {
    border: 0;
    border-radius: 4px;
    min-height: 54px;
    padding: 14px 20px;
    font-weight: 800;
  }

  .btn.primary {
    width: 100%;
    background: var(--ink);
    color: var(--paper-raised);
  }

  .btn.secondary {
    background: var(--soft);
    color: var(--green);
  }

  .btn.ghost {
    border: 1px solid var(--line);
    background: transparent;
  }

  .actions {
    display: flex;
    gap: 10px;
    margin-top: 18px;
  }

  .actions > * {
    flex: 1;
  }

  /* ==== 選択リスト（現在地・キャリア形態） ==== */
  .choice-list {
    display: grid;
    gap: 12px;
    margin-top: 24px;
  }

  .choice {
    width: 100%;
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 18px;
    min-height: 56px;
    text-align: left;
    background: var(--card);
  }

  .choice strong {
    display: block;
    font-size: 17px;
  }

  .choice span {
    display: block;
    margin-top: 5px;
    font-size: 13px;
    line-height: 1.55;
    color: var(--muted);
  }

  /* ==== 2択比較カード ==== */
  .pair {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin: 24px 0 14px;
  }

  .pair-card {
    min-height: 190px;
    border: 2px solid var(--line);
    border-radius: 4px;
    padding: 19px;
    text-align: left;
    background: var(--card);
  }

  .pair-card:active {
    border-color: var(--accent);
    transform: scale(0.985);
  }

  .pair-card b {
    display: block;
    margin-bottom: 12px;
    font-size: 20px;
    line-height: 1.25;
  }

  .pair-card span {
    font-size: 13px;
    line-height: 1.6;
    color: var(--muted);
  }

  .or {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 7px;
  }

  .or button {
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 10px 5px;
    font-size: 12px;
    background: transparent;
    color: var(--muted);
  }

  .reason {
    width: 100%;
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 13px 14px;
    margin-top: 12px;
    background: var(--card);
  }

  .navrow {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 22px;
  }

  .link {
    border: 0;
    padding: 10px 0;
    background: none;
    color: var(--muted);
  }

  .checks {
    display: grid;
    gap: 9px;
    margin: 24px 0;
  }

  .check {
    display: flex;
    gap: 12px;
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 14px;
    background: var(--card);
  }

  .check input {
    width: 20px;
    accent-color: var(--accent);
  }

  .check b {
    display: block;
  }

  .check small {
    display: block;
    margin-top: 3px;
    line-height: 1.4;
    color: var(--muted);
  }

  .result-head {
    border-radius: 4px;
    padding: 30px 26px;
    margin-bottom: 16px;
    background: var(--ink);
    color: var(--paper-raised);
  }

  .result-head .eyebrow {
    color: var(--ink-faint);
  }

  .result-head h2 {
    font-size: 32px;
  }

  .result-head p {
    line-height: 1.6;
    color: rgba(253, 251, 245, 0.8);
  }

  .panel {
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 26px 22px;
    margin: 22px 0;
    background: var(--card);
  }

  .rank {
    display: flex;
    align-items: center;
    gap: 11px;
    padding: 10px 0;
    border-bottom: 1px solid var(--hairline);
  }

  .rank:last-child {
    border: 0;
  }

  .rank .num {
    display: grid;
    place-items: center;
    width: 25px;
    height: 25px;
    border-radius: 50%;
    font-size: 12px;
    font-weight: 900;
    background: var(--soft);
  }

  .rank b {
    flex: 1;
  }

  .rank em {
    font-style: normal;
    font-size: 12px;
    color: var(--green);
  }

  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
  }

  .chip {
    border-radius: var(--radius-pill);
    padding: 8px 11px;
    font-size: 12px;
    background: var(--paper);
  }

  .prompt {
    max-height: 250px;
    overflow: auto;
    border-radius: 4px;
    padding: 14px;
    white-space: pre-wrap;
    font-size: 12px;
    line-height: 1.6;
    background: var(--paper);
  }

  /* ==== 履歴リスト ==== */
  .history {
    display: grid;
    gap: 10px;
  }

  .history-item {
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 16px;
    text-align: left;
    background: var(--card);
  }

  .history-item time {
    font-size: 12px;
    color: var(--muted);
  }

  .empty {
    padding: 70px 20px;
    text-align: center;
    color: var(--muted);
  }

  .note {
    font-size: 11px;
    line-height: 1.6;
    color: var(--muted);
  }

  /* ==== トースト通知 ==== */
  .toast {
    position: fixed;
    left: 50%;
    bottom: 28px;
    padding: 12px 18px;
    border-radius: var(--radius-pill);
    font-size: 13px;
    background: var(--ink);
    color: var(--paper-raised);
    opacity: 0;
    transform: translateX(-50%);
    pointer-events: none;
    transition: 0.2s;
  }

  .toast.show {
    opacity: 1;
  }

  @media (max-width: 430px) {
    .pair {
      grid-template-columns: 1fr;
    }

    .pair-card {
      min-height: 128px;
    }

    .screen {
      padding-top: 20px;
    }

    .hero {
      padding-top: 38px;
    }
  }

  .section-intro {
    padding-top: 42px;
  }

  .section-no {
    font-size: 72px;
    line-height: 1;
    font-weight: 900;
    letter-spacing: -0.08em;
    color: rgba(30, 58, 80, 0.12);
  }

  .tip {
    border-left: 3px solid var(--accent);
    padding: 3px 0 3px 14px;
    margin: 24px 0;
    line-height: 1.7;
    color: var(--muted);
  }

  .rank-wrap {
    padding: 10px 0;
    border-bottom: 1px solid var(--hairline);
  }

  .rank-wrap:last-child {
    border: 0;
  }

  .rank-wrap .rank {
    border: 0;
    padding: 0;
  }

  .rank-meta,
  .candidate-desc {
    font-size: 13px;
    color: var(--muted);
  }

  .candidate-detail {
    margin: 5px 0 0 36px;
    font-size: 13px;
    line-height: 1.55;
    color: var(--muted);
    opacity: 0.85;
  }

  /* ==== 可視化（レーダー・マップ・推移） ==== */
  .viz {
    display: block;
    width: 100%;
    height: auto;
    margin: 8px auto;
  }

  .viz .grid {
    fill: none;
    stroke: var(--line);
    stroke-width: 1;
  }

  .viz .axis {
    stroke: var(--ink-faint);
    stroke-width: 1;
  }

  .viz .shape {
    fill: rgba(46, 110, 142, 0.22);
    stroke: var(--accent);
    stroke-width: 2;
  }

  .viz text {
    font-size: 10px;
    fill: var(--muted);
  }

  .viz .dot {
    fill: var(--accent);
    stroke: var(--paper-raised);
    stroke-width: 2;
  }

  .bar-row {
    display: grid;
    grid-template-columns: 105px 1fr 30px;
    gap: 8px;
    align-items: center;
    margin: 10px 0;
    font-size: 12px;
  }

  .bar-track {
    height: 10px;
    border-radius: var(--radius-pill);
    overflow: hidden;
    background: rgba(30, 58, 80, 0.08);
  }

  .bar-fill {
    height: 100%;
    border-radius: var(--radius-pill);
    background: var(--course);
  }

  .saved {
    display: flex;
    gap: 9px;
    align-items: center;
    font-size: 13px;
    color: var(--green);
  }

  .saved:before {
    display: grid;
    place-items: center;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    font-weight: 900;
    background: var(--soft);
    content: "✓";
  }

  .contest {
    padding: 10px 0;
    border-bottom: 1px solid var(--hairline);
    line-height: 1.5;
  }

  .contest:last-child {
    border: 0;
  }

  .mode-grid {
    display: grid;
    gap: 14px;
    margin: 28px 0;
  }

  .mode-card {
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 20px;
    background: var(--card);
  }

  .mode-card h3 {
    font-size: 22px;
  }

  .mode-card p {
    line-height: 1.6;
    color: var(--muted);
  }

  .sort-row b {
    display: block;
    margin-bottom: 9px;
  }



  /* ==== MaxDiff（4択比較） ==== */
  .maxdiff-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 9px;
    margin: 20px 0;
  }

  .maxdiff-item {
    border: 2px solid var(--line);
    border-radius: 4px;
    padding: 15px;
    text-align: left;
    background: var(--card);
  }

  .maxdiff-item.best {
    border-color: var(--green);
    background: var(--soft);
  }

  .maxdiff-item.worst {
    border-color: var(--accent);
    background: rgba(159, 176, 188, 0.16);
  }

  .trade-card ul {
    padding-left: 18px;
    font-size: 13px;
    line-height: 1.7;
    color: var(--muted);
  }

  .reflection {
    min-height: 150px;
    width: 100%;
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 15px;
    background: var(--card);
    resize: vertical;
  }

  .pair-card.chosen,
  .choice.chosen {
    border-color: var(--green);
    background: var(--soft);
    box-shadow: 0 0 0 2px var(--green);
  }

  .maxdiff-item {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .maxdiff-item b {
    font-size: 16px;
    line-height: 1.35;
  }

  .maxdiff-item span {
    font-size: 13px;
    line-height: 1.65;
  }

  .md-actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 2px;
  }

  .md-btn {
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 11px 4px;
    min-height: 44px;
    font-size: 12.5px;
    font-weight: 700;
    background: var(--paper);
    color: var(--muted);
  }

  .md-btn.best.active {
    border-color: var(--green);
    background: var(--green);
    color: var(--paper-raised);
  }

  .md-btn.worst.active {
    border-color: var(--accent);
    background: var(--accent);
    color: var(--paper-raised);
  }

  .md-status {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin: 16px 0;
  }

  .md-status-item {
    flex: 1;
    min-width: 130px;
    border-radius: 4px;
    padding: 10px 12px;
    font-size: 12px;
    font-weight: 700;
    background: rgba(30, 58, 80, 0.05);
    color: var(--muted);
  }

  .md-status-item.set {
    background: var(--soft);
    color: var(--green);
  }

  .md-warning {
    font-weight: 700;
    color: var(--accent);
  }

  .md-sticky {
    position: sticky;
    bottom: 0;
    padding: 16px 0 6px;
    margin-top: 8px;
    background: var(--paper);
  }

  details.panel summary {
    font-weight: 800;
    font-size: 18px;
    list-style: none;
    cursor: pointer;
  }

  details.panel summary::-webkit-details-marker {
    display: none;
  }

  details.panel summary:after {
    float: right;
    font-weight: 400;
    color: var(--muted);
    content: "▾";
  }

  details.panel[open] summary:after {
    content: "▴";
  }

  .reflection-q {
    display: block;
    margin-top: 16px;
    font-size: 13px;
    font-weight: 700;
  }

  .reflection-q .reflection {
    margin-top: 8px;
    min-height: 80px;
    font-weight: 400;
  }

  @media (max-width: 430px) {
    .maxdiff-grid {
      grid-template-columns: 1fr;
    }
  }

  /* v0.9.8 UI/UX polish (visual only, no logic changes) */
  :root {
    --primary: var(--course);
    --primary-dark: var(--ink);
    --danger: var(--shallow);
    /* 角丸は2種類だけ：カード4px・チップ/バッジ2px */
    --radius: 4px;
    --radius-lg: 4px;
    --radius-pill: 2px;
  }

  body {
    font-size: 16px;
    line-height: 1.7;
  }

  .app {
    max-width: 480px;
    padding-left: 20px;
    padding-right: 20px;
  }

  h1 {
    line-height: 1.15;
  }

  h2 {
    font-size: 26px;
  }

  h3 {
    font-size: 20px;
    line-height: 1.4;
  }

  .lead {
    margin-bottom: 28px;
  }

  .btn {
    border-radius: var(--radius);
    padding: 16px 22px;
    font-size: 16px;
  }

  .btn.primary {
    background: var(--primary);
  }

  .btn.primary:active {
    background: var(--primary-dark);
  }

  .btn.secondary {
    color: var(--primary);
  }

  .link {
    padding: 12px 4px;
    font-size: 13px;
  }

  .choice,
  .pair-card,
  .mode-card,
  .maxdiff-item,
  .history-item,
  .panel,
  .result-head {
    border-radius: var(--radius-lg);
  }

  .check {
    border-radius: var(--radius);
  }

  .panel {
    margin: 24px 0;
  }

  .mode-grid {
    gap: 18px;
    margin: 32px 0;
  }

  .mode-card {
    padding: 24px 22px;
  }

  .mode-card h3 {
    margin: 10px 0 8px;
  }

  .mode-card p {
    margin: 0 0 18px;
    color: var(--muted);
  }

  .mode-card .btn {
    width: 100%;
  }

  .time-badge {
    display: inline-block;
    padding: 5px 12px;
    border-radius: var(--radius-pill);
    font-size: 12px;
    font-weight: 800;
    background: var(--soft);
    color: var(--primary);
  }

  /* ==== 共通：プログレスバー ==== */
  .progress-shell {
    padding: 14px 0 4px;
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 8px;
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
  }

  .progress-label span:first-child {
    color: var(--ink);
  }

  .progress-label span:last-child {
    color: var(--primary);
  }

  .progress {
    height: 6px;
    border-radius: var(--radius-pill);
  }

  .progress > i {
    background: var(--primary);
  }

  .choice {
    padding: 20px;
  }

  .choice strong {
    font-size: 17px;
  }

  .pair-card {
    padding: 20px;
  }

  .pair-card:active {
    border-color: var(--primary);
  }

  .pair-card.chosen,
  .choice.chosen {
    border-color: var(--primary);
    box-shadow: 0 0 0 2px var(--primary);
  }

  .navrow {
    margin-top: 26px;
  }

  .maxdiff-grid {
    gap: 12px;
    margin: 24px 0 16px;
  }

  .maxdiff-item {
    padding: 18px;
  }

  .maxdiff-item.best {
    border-color: var(--primary);
    background: var(--soft);
  }

  .maxdiff-item.worst {
    border-color: var(--danger);
    background: rgba(159, 176, 188, 0.16);
  }

  .md-btn {
    border-radius: 4px;
    padding: 12px 6px;
    min-height: 46px;
  }

  .md-btn.best.active {
    border-color: var(--primary);
    background: var(--primary);
  }

  .md-btn.worst.active {
    border-color: var(--danger);
    background: var(--danger);
  }

  .md-status-item.set {
    color: var(--primary);
  }

  function makeExploratoryPairs(list, limit = 14) {
    let all = [];
    for (let i = 0; i < list.length; i++)
      for (let j = i + 1; j < list.length; j++) {
        let a = list[i],
          b = list[j],
          kind =

      chosen = shuffle(all.filter((x) => x[2] === "exploration")).slice(0, Math.min(3, limit));
    chosen.forEach((p) => {

          Math.random();

    let ranks = r.rankings || {};

      return (
        ranks.overall ||
        [...(ranks.jobTypes || ranks.job || []), ...(ranks.soloGenres || ranks.solo || [])].sort(
          (a, b) => (b.score || 0) - (a.score || 0)
        )
      );
    if (p === "workStyle") return ranks.workStyles || ranks.style || ranks.soloStyles || [];
    return ranks[p] || [];
  }
  function branchOf(r) {
    return (
      r.career_branch ||
      (r.mode === "company" || r.mode === "solo"
        ? r.mode
        : r.career_mode && ["company_employee", "public_org"].includes(r.career_mode.id)
          ? "company"
          : "solo")
    );
  }
  function scoreCandidates(r) {
    let traits = r.userTraits || freshTraits(),
      stats = (r.candidateStats && r.candidateStats.career) || [],
      byId = Object.fromEntries(stats.map((x) => [x.id, finalizeStat({ ...x })]));
    return careerPool(false) // 結果表示は現在の絞り込み状態に関わらず全候補から集計する
      .map((item) => {
        let stat = byId[item.id] || emptyStat(item),
          affinity = affinityFor(item, traits),
          visualScore = stat.displayScore;
        return { ...item, ...stat, visualScore, affinity };
      })
      .sort((a, b) => b.visualScore - a.visualScore || b.confidence - a.confidence);
  }
  function insightFor(r) {
    let traits = r.userTraits || freshTraits(),
      displayTraits = r.displayTraits || normalizeTraitScores(traits, r.question_count || 1),
      scored = scoreCandidates(r),
      company = scored.filter((x) => x.domain === "company").slice(0, TOP_N_DISPLAY),
      individual = scored.filter((x) => x.domain === "individual").slice(0, TOP_N_DISPLAY),
      creative = scored
        .filter((x) => /music|illustration|video|writing|photo|design|content|handmade/.test(x.id))
        .slice(0, TOP_N_DISPLAY),
      overall = scored.filter((x) => x.played).slice(0, TOP_N_DISPLAY),
      unexplored = scored
        .filter((x) => !x.played)
        .sort((a, b) => b.affinity - a.affinity)
        .slice(0, UNEXPLORED_DISPLAY_COUNT),
      topTraits = Object.entries(displayTraits)
        .sort((a, b) => b[1] - a[1])
        .slice(0, TRAIT_RADAR_COUNT)
        .map(([id, score]) => ({ id, label: traitLabels[id], score })),
      avoidLeaning = scored
        .filter((x) => (x.worstCount || 0) > 0)
        .sort((a, b) => b.worstCount - a.worstCount || a.displayScore - b.displayScore)
        .slice(0, AVOID_LEANING_COUNT),
      misfitEnvironments = Object.entries(displayTraits)
        .sort((a, b) => a[1] - b[1])
        .slice(0, MISFIT_DISPLAY_COUNT)
        .map(([id, score]) => ({ id, label: traitLabels[id], score, hint: traitMisfitHints[id] })),
      logs = r.comparisonLogs || [],
      close = [];
    for (let i = 0; i < overall.length - 1; i++)
      if (Math.abs(overall[i].displayScore - overall[i + 1].displayScore) <= CLOSE_CONTEST_GAP)
        close.push(`${overall[i].label}と${overall[i + 1].label}が接戦です`);
    let both = logs.filter((x) => x.answer === "both").slice(-2),
      unknown = logs.filter((x) => x.answer === "unknown").slice(-2);
    both.forEach((x) => close.push(`${x.a}と${x.b}は「どちらもあり」でした`));
    unknown.forEach((x) => close.push(`${x.a}と${x.b}は、まだ判断材料が不足しています`));
    if (!close.length)
      close.push("上位候補と未探索候補を追加で比べると、判断軸がより明確になります");
    let mapItems = [...overall, ...unexplored].slice(0, MAP_POINT_COUNT),
      points = mapItems.map((x) => {
        let w = x.trait_weights || {},
          px = (w.autonomy || 0) - (w.team_support || 0),
          py = (w.creativity || 0) + (w.risk_tolerance || 0) - (w.stability || 0);
        return {
          id: x.id,
          label: x.label,
          x: Math.max(-1, Math.min(1, px / 1.2)),
          y: Math.max(-1, Math.min(1, py / 1.8)),
          domain: x.domain
        };
      }),
      possibilityMap = {
        company: company.map((x) => x.label),
        individual: individual.map((x) => x.label),
        creative: creative.map((x) => x.label),
        points
      },
      lean = points.length
        ? `可能性マップでは${points.reduce((n, x) => n + x.x, 0) >= 0 ? "個人自律" : "組織所属"}側、${points.reduce((n, x) => n + x.y, 0) >= 0 ? "創作・挑戦" : "安定運用"}側への反応がやや見られます`
        : "回答数が少ないため方向性は未確定です";
    return {
      overall,
      company,
      individual,
      creative,
      topTraits,
      unexplored,
      avoidLeaning,
      misfitEnvironments,
      closeContests: close.slice(0, TOP_N_DISPLAY),
      possibilityMap,
      lean,
      actions: [
        `「${(overall[0] || company[0]).label}」に近い人へ30分話を聞く`,
        `「${(individual[0] || { label: "気になる個人活動" }).label}」を1日だけ試す`,
        `${unexplored.map((x) => x.label).join("・")}を各15分調べる`,
        "AIプロンプトで追加比較すべき問いを出してもらう"
      ]
    };
  }

  // ==== 判断軸メタ分析（v1.4.0）：接戦ペアワイズの理由タグを集計する ====
  function reasonTagSummary(r) {
    let counts = {};
    (r.pairwiseLogs || []).forEach((x) => {
      if (x.reason_tag) counts[x.reason_tag] = (counts[x.reason_tag] || 0) + 1;
    });
    let total = Object.values(counts).reduce((n, x) => n + x, 0),
      ranked = REASON_TAGS.filter((t) => counts[t.id]).sort((a, b) => counts[b.id] - counts[a.id]),
      top = ranked.slice(0, 2).map((t) => ({ id: t.id, label: t.label, count: counts[t.id] })),
      unchosen = REASON_TAGS.filter((t) => !counts[t.id]).map((t) => t.label);
    return { counts, total, top, unchosen };
  }
  // ==== 時系列比較（v1.4.0）：直前の記録との順位変動 ====
  function previousRecordOf(r) {
    let list = history(),
      idx = list.findIndex((x) => x.id === r.id);
    if (idx >= 0) return list[idx + 1] || null;
    return list.find((x) => new Date(x.created_at) < new Date(r.created_at)) || null;
  }
  function rankComparison(r, prev) {
    if (!prev) return null;
    let cur = getRank(r, "career").slice(0, RANK_COMPARE_COUNT),
      prevRanks = getRank(prev, "career");
    if (!cur.length || !prevRanks.length) return null;
    let rows = cur.map((x, i) => {
        let pi = prevRanks.findIndex((y) => y.id === x.id);
        return {
          id: x.id,
          label: x.label,
          rank: i + 1,
          prevRank: pi >= 0 ? pi + 1 : null,
          delta: pi >= 0 ? pi - i : null // 正の値=順位が上がった
        };
      }),
      riser = rows.filter((x) => (x.delta || 0) > 0).sort((a, b) => b.delta - a.delta)[0] || null,
      days = Math.max(
        1,
        Math.round((new Date(r.created_at) - new Date(prev.created_at)) / 86400000)
      ),
      when = days >= 60 ? `${Math.round(days / 30)}ヶ月` : days >= 14 ? `${Math.round(days / 7)}週間` : `${days}日`,
      curTags = r.reason_tag_summary || reasonTagSummary(r),
      prevTags = prev.reason_tag_summary || reasonTagSummary(prev),
      tagChange = null;
    if (curTags.total >= REASON_TAG_MIN_COUNT && prevTags.total >= REASON_TAG_MIN_COUNT) {
      let curTop = curTags.top[0],
        prevTop = prevTags.top[0];
      if (curTop && prevTop)
        tagChange =
          curTop.id === prevTop.id
            ? `接戦で選ぶ軸は前回と同じく『${curTop.label}』が中心です。`
            : `接戦で選ぶ軸が『${prevTop.label}』中心から『${curTop.label}』中心に変わっています。`;
    }
    return { rows, riser, when, tagChange, sameMode: r.mode === prev.mode };
  }

  // ==================================================================
  // 4. STATE — セッション状態・保存・復元
  // ==================================================================
  // localStorageアクセスの一元化（容量超過やプライベートモードでの例外を握りつぶす）
  const HISTORY_KEY = "careerPairwiseLabHistory";
  function storageGet(key) {
    try {
      return localStorage.getItem(key);
    } catch {
      return null;
    }
  }
  function storageSet(key, value) {
    try {
      localStorage.setItem(key, value);
    } catch {}
  }
  function storageRemove(key) {
    try {
      localStorage.removeItem(key);
    } catch {}
  }
  // 回答ログは全てS.logsに集約される。S.anchorAnswers/S.pairwiseLogs/S.tradeoffLogsなどの
  // フェーズ別配列も同じログオブジェクトを保持しており、フェーズ単位でのスコア再計算に使う。
  // 過去に存在したS.tieLogs等の廃止済み配列は参照しないこと（再導入すると初回回答時に
  // クラッシュした実績がある）。S.cardSortLogsはv0.9.5以前に保存された履歴のスコア再計算
  // 互換のためだけに残しており、カード仕分け画面自体は現行フローには存在しない。
  function freshState() {
    return {
      view: "home",
      status: null,
      career: null,
      desiredCareerModes: [],
      scopeFilter: { industryIds: [], roleIds: [] },
      explorationFilters: { industryIds: [], roleIds: [], strength: "broad" },
      mode: null,
      experienceMode: null,
      sourceSessionId: null,
      phase: null,

      queue: [],
      phaseQueues: {},
      scores: {},

      maxDiffLogs: [],
      pairwiseLogs: [],
      tradeoffLogs: [],
      reflectionAnswers: [],
      answerTrail: [],
      navigationStack: [],
      editingAnswer: null,
      rankings: {},
      avoid: [],
      userTraits: freshTraits(),
      questionCount: 0,
      isEarlyResult: false
    };
  }
  let S = freshState();
  // 過去の結果レコードから、回答ログを引き継いだ追加分析用の状態を作る
  function stateFromRecord(r, branch, desired) {
    return {
      status: r.user_status?.id || null,
      career: desired[0]?.id || null,
      desiredCareerModes: desired.map((x) => x.id),
      explorationFilters: explorationFiltersOf(r),
      mode: branch,
      sourceSessionId: r.id,
      phase: null,
      index: 0,
      queue: [],
      phaseQueues: {},
      scores: {},
      selected: {},
      logs: [...(r.comparisonLogs || [])],
      anchorAnswers: [...(r.anchorAnswers || [])],
      cardSortLogs: [...(r.cardSortLogs || [])],
      maxDiffLogs: [...(r.maxDiffLogs || [])],
      pairwiseLogs: [...(r.pairwiseLogs || [])],
      tradeoffLogs: [...(r.tradeoffLogs || [])],
      reflectionAnswers: [...(r.reflectionAnswers || [])],
      answerTrail: [],
      navigationStack: [],
      editingAnswer: null,
      rankings: {},
      avoid: (r.avoidFactors || [])
        .map((name) => (branch === "company" ? D.avoid : D.risk).find((x) => x.label === name)?.id)
        .filter(Boolean),
      userTraits: freshTraits(),
      questionCount: 0,
      isEarlyResult: false
    };
  }
  const label = (list, id) => (list.find((x) => x.id === id) || {}).label || id;
  function desiredModesOf(session) {
    let value = session.desired_career_modes || (session.career_mode ? [session.career_mode] : []);
    return value
      .map((x) =>
        typeof x === "string"
          ? DESIRED_CAREER_MODES.find((m) => m.id === x) || { id: x, label: x }
          : x
      )
      .filter(Boolean);
  }
  // 旧履歴（exploration_filtersを持たない記録）を開いた場合は広め設定として扱う。
  function explorationFiltersOf(session) {
    let f = (session && session.exploration_filters) || {};
    return {
      industryIds: f.industry_ids || [],
      roleIds: f.role_ids || [],
      strength: f.strength || "broad"
    };
  }
  function history() {
    try {
      let value = JSON.parse(storageGet(HISTORY_KEY));
      return Array.isArray(value) ? value.filter((x) => x && typeof x === "object" && x.id) : [];
    } catch {
      storageRemove(HISTORY_KEY);
      return [];
    }
  }
  function saveHistoryList(list) {
    storageSet(HISTORY_KEY, JSON.stringify(list));
  }
  function save(r) {
    let h = history();
    h.unshift(r);
    saveHistoryList(h.slice(0, MAX_HISTORY));
  }
  const SESSION_KEY = "careerPairwiseLabSession";
  function saveSession() {
    if (!S.phase) return;
    storageSet(SESSION_KEY, JSON.stringify({ saved_at: new Date().toISOString(), state: S }));
  }
  function clearSession() {
    storageRemove(SESSION_KEY);
  }
  function loadSession() {
    try {
      let value = JSON.parse(storageGet(SESSION_KEY));
      return value && value.state && value.state.phase ? value : null;
    } catch {
      storageRemove(SESSION_KEY);
      return null;
    }
  }
  function resumeSession() {
    let sess = loadSession();
    if (!sess) {
      home();
      return;
    }
    S = sess.state;
    recalculateAllScores();
    if (["avoid", "risk"].includes(S.phase)) checks(candidates(S.phase));
    else if (["maxDiff", "additionalMaxDiff"].includes(S.phase))
      S.index < S.queue.length ? maxDiffScreen() : finishPhase();
    else S.index < S.queue.length ? pair() : finishPhase();
  }

  function copy(t) {

      navigator.clipboard
        .writeText(t)
        .then(() => toast("コピーしました"))
        .catch(() => fallback(t));
    else fallback(t);
  }
  function fallback(t) {
    let a = document.createElement("textarea");
    a.value = t;
    document.body.append(a);
    a.select();
    document.execCommand("copy");
    a.remove();
    toast("コピーしました");
  }

  function home() {

  function maxDiffScreen() {

        : !best
          ? "「一番気になる」も選ぶと次へ進めます。"

        item.classList.toggle("best", id === best);
        item.classList.toggle("worst", id === worst);
        item.querySelector(".md-btn.best").classList.toggle("active", id === best);
        item.querySelector(".md-btn.worst").classList.toggle("active", id === worst);

      );
      root.querySelectorAll("[data-role]").forEach(
        (b) =>
          (b.onclick = () => {
            let id = b.dataset.id,
              role = b.dataset.role;
            if (role === "best") {
              if (best === id) best = null;
              else {
                best = id;
                if (worst === id) worst = null;
              }
            } else {
              if (worst === id) worst = null;
              else {
                worst = id;

  function renderRadarChart(traits) {
    let items = [...traits].slice(0, TRAIT_RADAR_COUNT),
      cx = 160,
      cy = 155,
      r = 105,
      point = (i, ratio = 1) => {
        let a = -Math.PI / 2 + (i * Math.PI * 2) / items.length;
        return [cx + Math.cos(a) * r * ratio, cy + Math.sin(a) * r * ratio];
      },
      poly = (ratio) => items.map((_, i) => point(i, ratio).join(",")).join(" "),
      shape = items
        .map((x, i) =>
          point(
            i,
            0.2 + Math.max(SCORE_DISPLAY_MIN, Math.min(SCORE_DISPLAY_MAX, x.score)) / 125
          ).join(",")
        )
        .join(" ");
    return `<svg class="viz" viewBox="0 0 320 320" role="img" aria-label="上位traitのレーダーチャート">${[0.25, 0.5, 0.75, 1].map((x) => `<polygon class="grid" points="${poly(x)}"/>`).join("")}${items
      .map((_, i) => {
        let p = point(i);
        return `<line class="axis" x1="${cx}" y1="${cy}" x2="${p[0]}" y2="${p[1]}"/>`;
      })
      .join("")}<polygon class="shape" points="${shape}"/>${items
      .map((x, i) => {
        let p = point(i, 1.18);
        return `<text x="${p[0]}" y="${p[1]}" text-anchor="middle">${esc(x.label)} ${x.score}</text>`;
      })
      .join("")}</svg>`;
  }

  function scoreTrendSeries(h) {
    if (!h.length) return { series: [], count: 0 };
    let chronological = [...h].reverse().slice(-MAX_HISTORY),
      top3 = getRank(h[0], "career").slice(0, 3),
      series = top3.map((c) => ({
        id: c.id,
        label: c.label,
        points: chronological
          .map((r, i) => {
            let stat = getRank(r, "career").find((x) => x.id === c.id),
              score = stat ? (stat.displayScore ?? stat.score) : null;
            return typeof score === "number" ? { i, score } : null;
          })
          .filter(Boolean)
      }));
    return { series, count: chronological.length };
  }
  function renderScoreTrendChart(h) {
    let { series, count } = scoreTrendSeries(h);
    if (!series.length) return "";
    let w = 320,
      hgt = 200,
      padL = 30,
      padR = 10,
      padT = 14,
      padB = 24,
      plotW = w - padL - padR,
      plotH = hgt - padT - padB,
      xOf = (i) => padL + (count <= 1 ? plotW / 2 : (i / (count - 1)) * plotW),
      yOf = (s) => padT + plotH - (Math.max(0, Math.min(100, s)) / 100) * plotH,
      colors = ["#2E6E8E", "#A8854F", "#5A7184"],
      gridLines = [0, 25, 50, 75, 100]
        .map(
          (v) =>
            `<line class="grid" x1="${padL}" y1="${yOf(v)}" x2="${w - padR}" y2="${yOf(v)}"/><text x="${padL - 6}" y="${yOf(v) + 3}" text-anchor="end">${v}</text>`
        )
        .join(""),
      lines = series
        .map((s, idx) => {
          let color = colors[idx % colors.length],
            pts = s.points.map((p) => `${xOf(p.i)},${yOf(p.score)}`).join(" "),
            dots = s.points
              .map((p) => `<circle class="dot" cx="${xOf(p.i)}" cy="${yOf(p.score)}" r="3" style="fill:${color}"/>`)
              .join(""),
            polyline =
              s.points.length > 1
                ? `<polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2"/>`
                : "";
          return polyline + dots;
        })
        .join(""),
      legend = series
        .map(
          (s, idx) =>
            `<span class="chip" style="border-left:8px solid ${colors[idx % colors.length]}">${esc(s.label)}</span>`
        )
        .join("");
    return `<div class="panel"><h3>上位候補のスコア推移</h3><p class="note">直近${count}件の記録から、現在の上位3候補のスコアの推移を表示しています。</p><svg class="viz" viewBox="0 0 ${w} ${hgt}" role="img" aria-label="上位候補のスコア推移グラフ">${gridLines}${lines}</svg><div class="chips" style="margin-top:8px">${legend}</div></div>`;
  }

  function renderComparisonPanel(r) {

        .map((x) => {

  // ==== 反証モード（v1.4.0）：1位候補への逆質問3問 ====
  function renderFalsificationEntry(r, insight) {

    return `<div class="panel"><h3>この結果を疑ってみる（2分）</h3><p class="note">1位候補「${esc(insight.overall[0].label)}」について、あえて逆から考える3問です。仮説を鵜呑みにしないための任意ステップです。</p><button class="btn secondary" id="falsify" style="width:100%">この結果を疑ってみる</button></div>`;
  }
  function renderFalsificationRecordPanel(r) {
    let f = r.falsification_check;
    if (!f) return "";
    let items = [`<div class="contest">合わないとしたらの仮説：${esc(f.weakness.label)}</div>`];
    if (f.decisive)
      items.push(
        `<div class="contest">「${esc(f.runner_up_label || "2位候補")}」ではなく選ぶ決め手：${esc(f.decisive.label)}</div>`
      );
    items.push(
      `<div class="contest">まだ調べていないこと：${f.unexplored_topics.length ? esc(f.unexplored_topics.join("、")) : "なし"}</div>`
    );
    let support =
      f.weakness.id === "none" || (f.decisive && f.decisive.id === "unexplainable")
        ? `<p class="note">${esc(FALSIFICATION_SUPPORT_TEXT)}</p>`
        : "";
    return `<div class="panel"><h3>反証チェックの記録（1位候補「${esc(f.target_label)}」）</h3>${items.join("")}${support}<p class="note">この記録はAI分析用プロンプトにも反映されています。まだ調べていないことは、次の行動の起点になります。</p></div>`;
  }
  function startFalsification(r, insight) {
    let target = insight.overall[0];
    if (!target) return;
    let runnerUp = insight.overall[1] || null,
      item = careerPool(false).find((x) => x.id === target.id),
      weaknessOptions = Object.entries((item && item.trait_weights) || {})
        .sort((a, b) => b[1] - a[1])
        .slice(0, FALSIFICATION_WEAKNESS_COUNT)
        .map(([t]) => ({ id: t, label: traitMisfitHints[t] || traitLabels[t] || t }))
        .concat(FALSIFICATION_GENERIC_WEAKNESSES)
        .slice(0, FALSIFICATION_WEAKNESS_COUNT),
      answers = {
        target_id: target.id,
        target_label: target.label,
        runner_up_label: runnerUp ? runnerUp.label : null
      };
    falsificationWeakness(r, target, runnerUp, weaknessOptions, answers);
  }
  function falsificationWeakness(r, target, runnerUp, options, answers) {
    progress(1);
    screen(
      `<div class="eyebrow">反証チェック · 1 / 3</div><h2>もし「${esc(target.label)}」が合わなかったとしたら、理由はどれに近い？</h2><p class="note">断定するためではなく、確かめるべき点を先に知るための質問です。</p><div class="choice-list">${options.map((o, i) => `<button class="choice" data-weak="${i}"><strong>${esc(o.label)}</strong><span>これが続くことが、実は負担になるかもしれない</span></button>`).join("")}<button class="choice" data-weak="none"><strong>思いつかない</strong><span>合わない理由がすぐには浮かばない</span></button></div><div class="navrow"><button class="link" id="falsifyQuit">やめて結果に戻る</button><span></span></div>`
    );
    root.querySelectorAll("[data-weak]").forEach(
      (b) =>
        (b.onclick = () => {
          let v = b.dataset.weak;
          answers.weakness =
            v === "none"
              ? { id: "none", label: "思いつかない" }
              : { id: options[+v].id, label: options[+v].label };
          falsificationDecisive(r, target, runnerUp, answers);
        })
    );
    $("#falsifyQuit").onclick = () => showResult(r);
  }
  function falsificationDecisive(r, target, runnerUp, answers) {
    if (!runnerUp) {
      answers.decisive = null;
      falsificationUnexplored(r, target, answers);
      return;
    }
    progress(1);
    let supportNote =
      answers.weakness.id === "none" ? `<p class="note">${esc(FALSIFICATION_SUPPORT_TEXT)}</p>` : "";
    screen(
      `<div class="eyebrow">反証チェック · 2 / 3</div>${supportNote}<h2>「${esc(runnerUp.label)}」ではなく「${esc(target.label)}」を選ぶ決め手は？</h2><p class="note">いちばん近い理由を1つ選んでください。</p><div class="or reason-tags">${REASON_TAGS.map((t) => `<button data-decisive="${t.id}">${esc(t.label)}</button>`).join("")}</div><button class="btn ghost" id="unexplainable" style="width:100%;margin-top:14px">説明できない</button><div class="navrow"><button class="link" id="falsifyQuit">やめて結果に戻る</button><span></span></div>`
    );
    root.querySelectorAll("[data-decisive]").forEach(
      (b) =>
        (b.onclick = () => {
          let t = REASON_TAGS.find((x) => x.id === b.dataset.decisive);
          answers.decisive = { id: t.id, label: t.label };
          falsificationUnexplored(r, target, answers);
        })
    );
    $("#unexplainable").onclick = () => {
      answers.decisive = { id: "unexplainable", label: "説明できない" };
      falsificationUnexplored(r, target, answers);
    };
    $("#falsifyQuit").onclick = () => showResult(r);
  }
  function falsificationUnexplored(r, target, answers) {
    progress(1);

  const phases = () =>
    S.experienceMode === "standard"
      ? ["anchor", "maxDiff", "pairwise", S.mode === "company" ? "avoid" : "risk"]

        ? ["anchor", "maxDiff", "pairwise", "tradeoff", S.mode === "company" ? "avoid" : "risk"]

  function activeConfig() {

  function desiredModeExplanation() {

    if (!ids.length) return "";

      .map((id) => DESIRED_CAREER_MODES.find((m) => m.id === id)?.label)
      .filter(Boolean);

  }
  function transition(phase) {

      continuation = S.experienceMode === "deep_continuation",
      exploreMore = S.experienceMode === "explore_more",
      progressLabel = exploreMore
        ? `未探索チェック<br>追加回答 ${S.questionCount} / 約${cfg.maxAnswers}`

          ? `がっつり版：追加分析 ${i + 1} / ${list.length + 1}<br>追加回答 ${S.questionCount} / 約${cfg.maxAnswers}`
          : `${cfg.label}：ステップ ${i + 3} / ${list.length + 4}<br>回答 ${S.questionCount} / 約${cfg.maxAnswers}`,
      modeNote = ["maxDiff", "additionalMaxDiff"].includes(phase) ? desiredModeExplanation() : "",

        "既に見えている傾向は前提にせず、今の気になり度で選んでください。"

      `<div class="section-intro"><div class="section-no">${d[0]}</div><div class="eyebrow">${progressLabel}</div><h2>次は「${d[1]}」${phase === "result" ? "です" : "を行います"}</h2><p class="lead">${d[2]}</p>${phase === "result" ? "" : `<p class="note">${scopeNote}</p>`}${modeNote ? `<p class="note">${modeNote}</p>` : ""}<div class="tip"><b>回答のコツ</b><br>${d[3]}</div><button class="btn primary" id="next">進む</button><div class="navrow"><span></span><button class="link" id="reset">最初から</button></div></div>`

  function pushTrail(entry) {
    S.answerTrail.push(entry);
  }
  function removeLastMatching(array, predicate) {
    for (let i = array.length - 1; i >= 0; i--)
      if (predicate(array[i])) {
        array.splice(i, 1);
        return;
      }
  }
  function goBack() {
    let entry = S.answerTrail.pop();
    if (!entry) {
      let nav = S.navigationStack.pop();
      if (nav?.screen === "explorationFilters") selectExplorationFilters();
      else if (nav?.screen === "desiredCareerModes") selectDesiredCareerModes();
      return;
    }
    S.questionCount = Math.max(0, S.questionCount - 1);
    if (entry.type === "pair") {
      removeLastMatching(
        S.logs,
        (x) => x === entry.payload || x.questionKey === entry.payload.questionKey
      );
      if (entry.phase === "anchor")
        removeLastMatching(S.anchorAnswers, (x) => x.questionKey === entry.payload.questionKey);
      if (["pairwise", "closePairwise"].includes(entry.phase))
        removeLastMatching(S.pairwiseLogs, (x) => x.questionKey === entry.payload.questionKey);
      if (entry.phase === "tradeoff")
        removeLastMatching(S.tradeoffLogs, (x) => x.questionKey === entry.payload.questionKey);
    } else if (entry.type === "maxDiff")
      removeLastMatching(S.maxDiffLogs, (x) => x.question_id === entry.payload.question_id);
    else if (entry.type === "reflection")
      removeLastMatching(S.reflectionAnswers, (x) => x.id === entry.payload.id);
    else if (entry.type === "avoid") S.avoid = [...(entry.payload.selected || [])];
    recalculateAllScores();
    saveSession();
    S.phase = entry.phase;
    S.index = entry.index;
    S.queue = S.phaseQueues[entry.phase] || S.queue;
    S.editingAnswer = entry;
    if (entry.type === "pair") pair();
    else if (entry.type === "maxDiff") maxDiffScreen();
    else if (entry.type === "reflection") reflectionScreen();
    else checks(candidates(entry.phase));

  function startPhase(phase) {
    S.phase = phase;
    S.index = 0;
    S.editingAnswer = null;
    let cfg = activeConfig(),
      list;
    if (["avoid", "risk"].includes(phase)) {
      S.phaseQueues[phase] = candidates(phase);
      checks(S.phaseQueues[phase]);
      return;
    }
    if (["maxDiff", "additionalMaxDiff"].includes(phase)) {
      let count = phase === "maxDiff" ? cfg.flow.maxDiff : cfg.flow.additionalMaxDiff;
      S.queue = maxDiffSets(count);
      S.phaseQueues[phase] = S.queue;
      list = [...new Set(S.queue.flat())];
      S.selected[phase] = list;
      ensureStats("career", list);
      maxDiffScreen();
      return;
    }
    if (phase === "reflection") {
      S.phaseQueues[phase] = REFLECTION_QUESTIONS;
      reflectionScreen();
      return;
    }
    if (phase === "anchor") {
      S.queue = anchorPairs(cfg.flow.anchor);
    } else if (["pairwise", "closePairwise"].includes(phase)) {
      let count = phase === "pairwise" ? cfg.flow.pairwise : cfg.flow.closePairwise;
      S.queue = pairwisePairs(count);
    } else S.queue = tradeoffPairs(cfg.flow.tradeoff);
    S.phaseQueues[phase] = S.queue;
    list = [...new Set(S.queue.flatMap((x) => x.slice(0, 2)))];
    S.selected[phase] = list;
    if (phase !== "tradeoff") ensureStats("career", list);
    pair();
  }
  function answer(ans, a, b, kind, reasonTag) {
    let log = {
      type: kind,
      questionKey: `${S.phase}_${S.index}`,
      phase: S.phase,
      aId: a.id,
      bId: b.id,
      a: a.label,
      b: b.label,
      aDescription: a.description,
      bDescription: b.description,
      aTraits: a.trait_weights || {},
      bTraits: b.trait_weights || {},
      answer: ans,
      reason_tag: reasonTag || null,
      comparisonType: kind
    };
    S.logs.push(log);
    if (S.phase === "anchor") S.anchorAnswers.push(log);
    if (["pairwise", "closePairwise"].includes(S.phase)) S.pairwiseLogs.push(log);
    if (S.phase === "tradeoff") S.tradeoffLogs.push(log);
    pushTrail({ type: "pair", phase: S.phase, index: S.index, payload: log });
    recalculateAllScores();
    S.questionCount++;
    S.index++;
    S.editingAnswer = null;
    if (S.questionCount >= activeConfig().maxAnswers) {
      transition(
        S.experienceMode === "standard" || S.experienceMode === "deep"
          ? S.mode === "company"
            ? "avoid"
            : "risk"
          : phases()[phases().length - 1]
      );
    } else if (S.index < S.queue.length) pair();

  }

          : "risk"

    if (i < phases().length - 1) transition(phases()[i + 1]);

    continuationIntro(r);
  }
  // 結果画面から未探索候補だけを4択で追加比較する小ループ（v1.1）
  function startUnexploredRound(r) {
    let branch = r.career_branch || branchOf(r),
      desired = desiredModesOf(r);
    S = {
      ...S,
      ...stateFromRecord(r, branch, desired),
      view: "exploreMore",
      experienceMode: "explore_more"
    };
    recalculateAllScores();
    transition("additionalMaxDiff");
  }

  // ==================================================================
  // 7. EXPORT / IMPORT — 履歴レコード・AIプロンプト・共有テキスト
  // ==================================================================
  function record() {
    recalculateAllScores();
    let now = new Date().toISOString(),
      status = { id: S.status, label: label(D.status, S.status) },
      desired = S.desiredCareerModes
        .map((id) => DESIRED_CAREER_MODES.find((x) => x.id === id))
        .filter(Boolean),
      overall = ranking("career"),
      candidateStats = {
        career: Object.values(S.scores.career || {}).map((x) => finalizeStat({ ...x }))
      },
      completion =
        S.experienceMode === "standard"
          ? "standard_completed"
          : S.experienceMode === "explore_more"
            ? "explore_more_completed"
            : "deep_completed",
      displayTraits = normalizeTraitScores(S.userTraits, S.questionCount);
    let base = {
      id: String(Date.now()),
      created_at: now,
      updated_at: now,
      version: "2.1.0",
      mode: S.experienceMode,
      status: completion,
      source_session_id: S.sourceSessionId,
      user_status: status,
      desired_career_modes: desired,
      exploration_filters: {
        industry_ids: [...(S.explorationFilters?.industryIds || [])],
        role_ids: [...(S.explorationFilters?.roleIds || [])],
        strength: S.explorationFilters?.strength || "broad"
      },
      career_mode: null,
      career_branch: S.mode,
      anchorAnswers: S.anchorAnswers,
      cardSortLogs: S.cardSortLogs,
      maxDiffLogs: S.maxDiffLogs,
      pairwiseLogs: S.pairwiseLogs,
      tradeoffLogs: S.tradeoffLogs,
      reflectionAnswers: S.reflectionAnswers,
      avoidFactors: S.avoid.map((id) => label(S.mode === "company" ? D.avoid : D.risk, id)),
      candidateStats,
      userTraits: { ...S.userTraits },
      rawTraitScores: { ...S.userTraits },
      displayTraits,
      rankings: { overall },
      comparisonLogs: S.logs,
      question_count: S.questionCount,
      is_early_result: S.isEarlyResult
    };
    let insight = insightFor(base);
    base.possibilityMap = insight.possibilityMap;
    base.closeContests = insight.closeContests;
    base.unexploredCandidates = insight.unexplored;
    base.resultSummary = {
      mode: activeConfig().label,
      lean: insight.lean,
      desiredCareerModes: desired.map((x) => x.label),
      topCandidates: insight.overall.slice(0, TOP_N_DISPLAY).map((x) => x.label),
      topTraits: insight.topTraits.slice(0, TOP_N_DISPLAY).map((x) => x.label)
    };
    base.insights = insight;
    base.reason_tag_summary = reasonTagSummary(base);
    base.aiPrompt = promptFor(base);
    return base;
  }
  function promptFor(r) {
    let insight = r.insights || insightFor(r),
      deep = r.mode !== "standard",
      desired =
        desiredModesOf(r)
          .map((x) => x.label)
          .join("、") || "未設定",
      filters = explorationFiltersOf(r),
      industryLabels =
        filters.industryIds
          .map((id) => INDUSTRY_FILTERS.find((x) => x.id === id)?.label)
          .filter(Boolean)
          .join("、") || "指定なし",
      roleLabels =
        filters.roleIds
          .map((id) => ROLE_FILTERS.find((x) => x.id === id)?.label)
          .filter(Boolean)
          .join("、") || "指定なし",
      strengthLabel =
        FILTER_STRENGTH_OPTIONS.find((x) => x.id === filters.strength)?.label || "広めに見る",
      maxdiff =
        (r.maxDiffLogs || [])
          .slice(-8)
          .map((x) => `${x.best} > ${x.neutral_ids?.length || 0}候補 > ${x.worst}`)
          .join(" / ") || "なし",
      pairs =
        (r.pairwiseLogs || [])
          .slice(-8)
          .map((x) => `${x.a} vs ${x.b}: ${x.answer}`)
          .join(" / ") || "なし",
      fmt = (list) =>
        list
          .slice(0, TOP_N_DISPLAY)
          .map(
            (x, i) =>
              `${i + 1}. ${x.label}: displayScore ${x.displayScore} / 比較${x.played} / 信頼度${getConfidenceLabel(x.confidence)} / Best ${x.bestCount || 0} / Worst ${x.worstCount || 0}`
          )
          .join("\n"),
      reasonTags =
        (r.pairwiseLogs || [])
          .filter((x) => x.reason_tag)
          .map(
            (x) =>
              `- ${x.answer === "a" ? x.a : x.b}（vs ${x.answer === "a" ? x.b : x.a}）: ${REASON_TAGS.find((t) => t.id === x.reason_tag)?.label || x.reason_tag}`
          )
          .join("\n") || "なし",
      reflection =
        (r.reflectionAnswers || [])
          .filter((x) => x.answer)
          .map((x) => `- ${x.text}: ${x.answer}`)
          .join("\n") || "なし",
      tradeoffs =
        (r.tradeoffLogs || [])
          .map((x) => `- ${x.aDescription} / ${x.bDescription}: ${x.answer}`)
          .join("\n") || "なし",
      low = scoreCandidates(r)
        .filter((x) => x.confidence < CONFIDENCE_MID)
        .slice(0, TOP_N_DISPLAY)
        .map((x) => x.label)
        .join("、"),
      axisSummary = r.reason_tag_summary || reasonTagSummary(r),
      axisText =
        axisSummary.total >= REASON_TAG_MIN_COUNT
          ? `繰り返し選んだ軸: ${axisSummary.top.map((t) => `${t.label}${t.count}回`).join("、")} / 一度も選ばなかった軸: ${axisSummary.unchosen.join("、") || "なし"}`
          : "タグ回答が少ないため未集計",
      f = r.falsification_check,
      falsificationText = f
        ? `1位候補「${f.target_label}」について / 合わないとしたらの仮説: ${f.weakness.label}${f.decisive ? ` / 「${f.runner_up_label || "2位候補"}」ではなく選ぶ決め手: ${f.decisive.label}` : ""} / まだ調べていないこと: ${f.unexplored_topics.length ? f.unexplored_topics.join("、") : "なし"}`
        : "未実施";
    return `現在地: ${r.user_status?.label || "不明"}\n希望する・気になるキャリア形態: ${desired}\n業界・業種フィルター: ${industryLabels}\n職種フィルター: ${roleLabels}\n探索の広さ: ${strengthLabel}\nこれらは候補除外ではなく、MaxDiff候補セットの配合を調整する探索設定として使用しています。\nMaxDiff結果: ${maxdiff}\n接戦ペアワイズ結果: ${pairs}\n\nこれは${deep ? "がっつり版" : "標準版"}の探索型キャリア比較ログです。${r.mode === "deep_continuation" ? "標準版の回答を引き継いだ追加分析です。" : ""}スコアは確定値ではなく探索用の推定値です。\n\n回答数: ${r.question_count}\ntrait上位: ${insight.topTraits.map((x) => `${x.label} ${x.score}`).join("、")}\n可能性マップ: ${insight.lean}\n総合候補:\n${fmt(insight.overall)}\n会社員寄り:\n${fmt(insight.company)}\n個人活動寄り:\n${fmt(insight.individual)}\n創作・副業寄り:\n${fmt(insight.creative)}\n接戦・迷い: ${insight.closeContests.join(" / ")}\n信頼度が低い候補: ${low}\n未探索: ${insight.unexplored.map((x) => x.label).join("、")}\n今は距離を感じている候補（仮説）: ${insight.avoidLeaning.map((x) => `${x.label}(Worst${x.worstCount || 0}回)`).join("、") || "該当なし"}\nフィットしにくいかもしれない環境（仮説）: ${insight.misfitEnvironments.map((x) => `${x.hint}（関連傾向:${x.label}）`).join("、")}\n避けたい要素: ${(r.avoidFactors || []).join("、") || "未選択"}\n接戦比較で選んだ理由タグ:\n${reasonTags}\n判断軸メタ分析（理由タグ集計）: ${axisText}\nトレードオフ回答:\n${tradeoffs}\n内省回答:\n${reflection}\n反証チェック: ${falsificationText}\n\n値を断定せず、迷いの構造と反証すべき問いを示してください。信頼度の低い候補から追加で比較すべき組み合わせ、話を聞く相手、小さく試す行動を提案してください。距離を感じている候補や環境についても、決めつけずに仮説として深掘りする問いを含めてください。`;
  }
  // ==== 求人票照合プロンプト（v1.5.0）====
  function jobPostingPrompt(r) {
    let insight = r.insights || insightFor(r),
      top =
        insight.overall
          .slice(0, TOP_N_DISPLAY)
          .map((x, i) => `${i + 1}. ${x.label}（スコア${x.displayScore}）`)
          .join("\n") || "（比較データなし）",
      axisSummary = r.reason_tag_summary || reasonTagSummary(r),
      axis =
        axisSummary.total >= REASON_TAG_MIN_COUNT
          ? axisSummary.top.map((t) => `${t.label}（${t.count}回）`).join("、")
          : "未集計",
      branch = branchOf(r),
      list = branch === "company" ? D.avoid : D.risk,
      avoidLines =
        (r.avoidFactors || r.avoid_factors || [])
          .map((label) => {
            let item = list.find((x) => x.label === label),
              q = item && AVOID_CHECK_QUESTIONS[item.id];
            return q ? `- ${label}（確認したい問い: ${q.check} / ${q.ask}）` : `- ${label}`;
          })
          .join("\n") || "- 未選択",
      desired =
        desiredModesOf(r)
          .map((x) => x.label)
          .join("、") || "未設定";
    return `以下は、キャリア探索ツール「キャリア比較ラボ」でのユーザーの自己分析サマリーです。\n\n現在地: ${r.user_status?.label || "不明"}\n希望する・気になるキャリア形態: ${desired}\n関心が寄っている候補TOP${TOP_N_DISPLAY}:\n${top}\n接戦で繰り返し選んだ判断軸: ${axis}\n避けたい要素:\n${avoidLines}\n\nこの後にユーザーが貼る求人票（または案件・募集要項）を、上記の診断結果と照合してください。特に避けたい要素との矛盾の可能性、記載が無く面接で確認すべき点を、断定せずに指摘してください。企業を批判せず、ユーザーが確認すべき問いのリストとして出力してください。`;
  }
  function shareText(insight) {
    let top3 = insight.overall
        .slice(0, 3)
        .map((x, i) => `${i + 1}. ${x.label}（${x.displayScore}点）`)
        .join("\n"),
      traits3 = insight.topTraits
        .slice(0, 3)
        .map((x, i) => `${i + 1}. ${x.label}（${x.score}点）`)
        .join("\n");
    return `【キャリア比較ラボ 結果】\n\n■ 候補TOP3\n${top3}\n\n■ 傾向TOP3\n${traits3}`;
  }
  function downloadText(filename, text) {
    let blob = new Blob([text], { type: "text/plain;charset=utf-8" }),
      url = URL.createObjectURL(blob),
      a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.append(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }
  function resultDownloadText(r, insight) {
    let candidates = insight.overall
        .slice(0, TOP_N_DISPLAY)
        .map((x, i) => `${i + 1}. ${x.label}（${x.displayScore}点 / 比較${x.played}回）`)
        .join("\n"),
      traits = insight.topTraits
        .map((x, i) => `${i + 1}. ${x.label}（${x.score}点）`)
        .join("\n"),
      prompt = r.aiPrompt || r.ai_prompt || "";
    return `キャリア比較ラボ 結果メモ（v2.1.0）\n作成日時: ${new Date(r.created_at || Date.now()).toLocaleString("ja-JP")}\n\n■ 候補TOP${TOP_N_DISPLAY}\n${candidates}\n\n■ 傾向TOP${insight.topTraits.length}\n${traits}\n\n■ AIプロンプト\n${prompt}\n`;
  }

  // ==================================================================
  // 8. BOOT — 初期化
  // ==================================================================
  document
    .querySelectorAll(".tab")
    .forEach((t) => (t.onclick = () => (t.dataset.tab === "history" ? showHistory() : reset())));
  home();
  // PWA（v1.6.0）：Service Worker登録。プログレッシブエンハンスメントとして実装しており、
  // file://での直開き・sw.jsが無い単体配布・未対応ブラウザでは何もせず全機能がそのまま動く。
  function showUpdateToast(reg) {
    let t = $("#toast");
    if (!t) return;
    t.textContent = "新しい海図が届いています（タップで更新）";
    t.classList.add("show", "toast-action");
    t.onclick = () => {
      if (reg.waiting) reg.waiting.postMessage("SKIP_WAITING");
      t.classList.remove("show", "toast-action");
      t.onclick = null;
    };
  }
  if (
    typeof navigator !== "undefined" &&
    "serviceWorker" in navigator &&
    typeof location !== "undefined" &&
    location.protocol.indexOf("http") === 0
  ) {
    window.addEventListener("load", () => {
      navigator.serviceWorker
        .register("sw.js")
        .then((reg) => {
          if (reg.waiting && navigator.serviceWorker.controller) showUpdateToast(reg);
          reg.addEventListener("updatefound", () => {
            let sw = reg.installing;
            if (!sw) return;
            sw.addEventListener("statechange", () => {
              if (sw.state === "installed" && navigator.serviceWorker.controller)
                showUpdateToast(reg);
            });
          });
        })
        .catch(() => {});
      let refreshed = false;
      navigator.serviceWorker.addEventListener("controllerchange", () => {
        if (refreshed) return;
        refreshed = true;
        location.reload();
      });
    });
  }
})();
</script></body></html>
