function select(type){S.view=type;let isStatus=type==='status',list=D[type];progress(isStatus?.05:.1);screen(`<div class="eyebrow">${isStatus?'STEP 1 / 現在地':'STEP 2 / キャリア形態'}</div><h2>${isStatus?'今の自分に最も近いのは？':'今、最も近い働き方は？'}</h2><p class="lead">正解ではなく、現時点の感覚で選んでください。</p><div class="choice-list">${list.map(x=>`<button class="choice" data-id="${x.id}"><strong>${x.label}</strong><span>${x.description}</span></button>`).join('')}</div><div class="navrow"><button class="link" id="back">← 戻る</button><button class="link" id="reset">最初から</button></div>`);root.querySelectorAll('.choice').forEach(b=>b.onclick=()=>{S[type]=b.dataset.id;if(isStatus)select('career');else if(S.career==='hybrid')hybrid();else{S.mode=['company_employee','public_org'].includes(S.career)?'company':'solo';startPhase('interest')}});$('#back').onclick=isStatus?home:()=>select('status');$('#reset').onclick=reset}
function hybrid(){screen(`<div class="eyebrow">分岐の確認</div><h2>複業のどちら側を中心に考える？</h2><p class="lead">今回の比較で、より深く整理したい側を選んでください。</p><div class="choice-list"><button class="choice" data-mode="company"><strong>会社員・組織の仕事</strong><span>業界と職種を比較する</span></button><button class="choice" data-mode="solo"><strong>個人活動・副業</strong><span>活動ジャンルと収益モデルを比較する</span></button></div><div class="navrow"><button class="link" id="back">← 戻る</button><button class="link" id="reset">最初から</button></div>`);root.querySelectorAll('[data-mode]').forEach(b=>b.onclick=()=>{S.mode=b.dataset.mode;startPhase('interest')});$('#back').onclick=()=>select('career');$('#reset').onclick=reset}
const phases=()=>S.mode==='company'?['interest','industry','job','style','avoid']:['interest','solo','revenue','soloStyle','risk'];
function candidates(phase){if(phase==='industry'){let top=topIds('interest',4);return D.industry.map(x=>({...x,fit:x.related_interest_areas.filter(i=>top.includes(i)).length})).sort((a,b)=>b.fit-a.fit).slice(0,10)}if(phase==='job'){let topI=topIds('interest',4),topN=topIds('industry',3);return D.job.map(x=>({...x,fit:x.related_interest_areas.filter(i=>topI.includes(i)).length+x.related_industries.filter(i=>topN.includes(i)).length})).sort((a,b)=>b.fit-a.fit).slice(0,10)}if(phase==='solo'){let top=topIds('interest',4),pref={creator:['music_live','illustration_art','video_streaming','writing_editing','photo_movie'],small_business:['kitchen_car','small_restaurant','beauty_bodycare','local_farming'],freelance:['it_freelance','consulting_advisor','writing_editing','photo_movie']}[S.career]||[];return D.solo.map((x,i)=>({...x,fit:(pref.includes(x.id)?3:0)+(top.includes('creative_expression')&&['music_live','illustration_art','video_streaming','writing_editing','photo_movie'].includes(x.id)?2:0)+(top.includes('talk_solve')&&['beauty_bodycare','teaching_coaching','consulting_advisor'].includes(x.id)?2:0)-i/100})).sort((a,b)=>b.fit-a.fit).slice(0,10)}if(phase==='revenue'){let top=topIds('solo',3),bias={product_sales:['handmade_goods','online_shop','illustration_art'],service_sales:['beauty_bodycare','consulting_advisor'],contract_work:['it_freelance','photo_movie','writing_editing'],lesson_course:['teaching_coaching'],event_live:['music_live','kitchen_car'],store_sales:['small_restaurant','kitchen_car'],ad_sns:['video_streaming'],license_rights:['music_live','illustration_art']} ;return D.revenue.map(x=>({...x,fit:(bias[x.id]||[]).filter(i=>top.includes(i)).length})).sort((a,b)=>b.fit-a.fit).slice(0,8)}return D[phase]}
function makePairs(list){let q=[],n=list.length;for(let i=0;i<n;i++)q.push([list[i],list[(i+Math.ceil(n/2))%n]]);return q}
function startPhase(phase){S.phase=phase;S.index=0;S.scores[phase]={};let list=candidates(phase);list.forEach(x=>S.scores[phase][x.id]=0);if(['avoid','risk'].includes(phase)){checks(list);return}S.queue=makePairs(list);pair()}
const names={interest:'興味軸',industry:'業界',job:'職種',style:'仕事スタイル',solo:'個人活動ジャンル',revenue:'収益モデル',soloStyle:'個人活動スタイル'};
function progress(extra){let p=extra??(.12+.78*((phases().indexOf(S.phase)+(S.index/Math.max(S.queue.length,1)))/phases().length));$('.progress').hidden=!p;$('.progress i').style.width=`${p*100}%`}
function pair(){let[a,b]=S.queue[S.index];progress();screen(`<div class="eyebrow">${names[S.phase]} · ${S.index+1} / ${S.queue.length}</div><h2>今、より惹かれるのは？</h2><div class="pair"><button class="pair-card" data-answer="a"><b>${a.label}</b><span>${a.description}</span></button><button class="pair-card" data-answer="b"><b>${b.label}</b><span>${b.description}</span></button></div><div class="or"><button data-answer="both">どちらもあり</button><button data-answer="neither">どちらも微妙</button><button data-answer="unknown">わからない</button></div><input class="reason" id="reason" maxlength="100" placeholder="理由を一言（任意）"><div class="navrow"><button class="link" id="back">← 戻る</button><button class="link" id="reset">最初から</button></div>`);root.querySelectorAll('[data-answer]').forEach(x=>x.onclick=()=>answer(x.dataset.answer,a,b));$('#back').onclick=backPair;$('#reset').onclick=reset}
function answer(ans,a,b){let reason=$('#reason').value.trim();if(ans==='a')S.scores[S.phase][a.id]+=1;if(ans==='b')S.scores[S.phase][b.id]+=1;if(ans==='both'){S.scores[S.phase][a.id]+=.5;S.scores[S.phase][b.id]+=.5}S.logs.push({phase:S.phase,a:a.label,b:b.label,answer:ans,reason});S.index++;if(S.index<S.queue.length)pair();else finishPhase()}
function backPair(){if(!S.index){let i=phases().indexOf(S.phase);if(i===0)hybridOrCareer();else restartPhase(phases()[i-1]);return}let log=S.logs.pop(),[a,b]=S.queue[--S.index];if(log.answer==='a')S.scores[S.phase][a.id]-=1;if(log.answer==='b')S.scores[S.phase][b.id]-=1;if(log.answer==='both'){S.scores[S.phase][a.id]-=.5;S.scores[S.phase][b.id]-=.5}pair()}
function restartPhase(phase){S.logs=S.logs.filter(x=>x.phase!==phase);delete S.rankings[phase];startPhase(phase)}
function hybridOrCareer(){S.career==='hybrid'?hybrid():select('career')}
function finishPhase(){S.rankings[S.phase]=ranking(S.phase);let i=phases().indexOf(S.phase);if(i<phases().length-1)startPhase(phases()[i+1]);else complete()}
function ranking(p){let list=candidates(p),scores=S.scores[p]||{};return list.map(x=>({id:x.id,label:x.label,score:scores[x.id]||0})).sort((a,b)=>b.score-a.score||a.label.localeCompare(b.label,'ja'))}
function topIds(p,n){return (S.rankings[p]||ranking(p)).slice(0,n).map(x=>x.id)}
function checks(list){progress();let title=S.mode==='company'?'避けたい働き方は？':'避けたいリスクは？';screen(`<div class="eyebrow">最後の確認</div><h2>${title}</h2><p class="lead">該当するものをすべて選んでください。未選択でも進めます。</p><div class="checks">${list.map(x=>`<label class="check"><input type="checkbox" value="${x.id}"><span><b>${x.label}</b><small>${x.description}</small></span></label>`).join('')}</div><button class="btn primary" id="done">結果を見る</button><div class="navrow"><button class="link" id="back">← 戻る</button><button class="link" id="reset">最初から</button></div>`);$('#done').onclick=()=>{S.avoid=[...root.querySelectorAll('input:checked')].map(x=>x.value);finishPhase()};$('#back').onclick=()=>restartPhase(phases()[phases().length-2]);$('#reset').onclick=reset}
function complete(){S.rankings[S.phase]=ranking(S.phase);let rec=record();save(rec);showResult(rec)}
function record(){let status={id:S.status,label:label(D.status,S.status)},career={id:S.career,label:label(D.career,S.career)};let base={id:String(Date.now()),created_at:new Date().toISOString(),user_status:status,career_mode:career,mode:S.mode,rankings:S.rankings,avoid_factors:S.avoid.map(id=>label(S.mode==='company'?D.avoid:D.risk,id)),comparison_logs:S.logs};base.ai_prompt=promptFor(base);return base}
function promptFor(r){let rk=(k,n=5)=>(r.rankings[k]||[]).slice(0,n).map((x,i)=>`${i+1}. ${x.label}（${x.score}点）`).join('\n');let reasons=r.comparison_logs.filter(x=>x.reason).map(x=>`- ${x.a} / ${x.b}: ${x.reason}`).join('\n')||'なし';let branch=r.mode==='company'?`業界ランキング:\n${rk('industry')}\n職種ランキング:\n${rk('job')}`:`活動ジャンルランキング:\n${rk('solo')}\n収益モデルランキング:\n${rk('revenue')}`;return `あなたはキャリア意思決定の支援者です。以下を適職診断のように断定せず、本人の関心と判断軸についての仮説として分析してください。\n\n現在地: ${r.user_status.label}\nキャリア形態: ${r.career_mode.label}（${r.mode==='company'?'組織所属':'個人活動'}モード）\n興味軸ランキング:\n${rk('interest')}\n${branch}\n仕事スタイルランキング:\n${rk(r.mode==='company'?'style':'soloStyle')}\n避けたい要素・リスク: ${r.avoid_factors.join('、')||'未選択'}\n比較理由:\n${reasons}\n\n次の形式で回答してください。\n1. 関心が寄っている可能性がある方向（仮説を3つ）\n2. 仮説を確かめるため次に調べること\n3. 追加で比較すべき選択肢\n4. キャリア相談で深掘りすべき質問\n5. 注意すべきトレードオフ\n断定表現は避け、不足情報を明示してください。`;}
function save(r){let h=history();h.unshift(r);localStorage.setItem('careerPairwiseLabHistory',JSON.stringify(h.slice(0,30)))}function history(){try{return JSON.parse(localStorage.getItem('careerPairwiseLabHistory'))||[]}catch{return[]}}
function ranks(title,items){return `<div class="panel"><h3>${title}</h3>${(items||[]).slice(0,5).map((x,i)=>`<div class="rank"><span class="num">${i+1}</span><b>${x.label}</b><em>${x.score} pt</em></div>`).join('')}</div>`}
function showResult(r){progress(1);let company=r.mode==='company',style=company?'style':'soloStyle',next=company?`上位の「${r.rankings.industry[0].label}」で「${r.rankings.job[0].label}」が実際に担う業務と、未経験からの入口を調べる。`:`「${r.rankings.solo[0].label}」を、費用と期間を限定した小さな試作品・体験提供から試す。`,who=company?`${r.rankings.industry[0].label}で${r.rankings.job[0].label}に近い仕事をする人`:`${r.rankings.solo[0].label}を副業または小規模で続けている人`;screen(`<div class="result-head"><div class="eyebrow">YOUR WORKING HYPOTHESIS</div><h2>結果は、次に進むための仮説です。</h2><p>関心の強さを比較結果から整理しました。「向いている」という断定ではありません。</p></div>${ranks('興味軸',r.rankings.interest)}${company?ranks('業界',r.rankings.industry)+ranks('職種',r.rankings.job):ranks('個人活動ジャンル',r.rankings.solo)+ranks('収益モデル',r.rankings.revenue)}${ranks(company?'仕事スタイル':'個人活動スタイル',r.rankings[style])}<div class="panel"><h3>${company?'避けたい要素':'避けたいリスク'}</h3><div class="chips">${r.avoid_factors.length?r.avoid_factors.map(x=>`<span class="chip">${x}</span>`).join(''):'<span class="note">未選択</span>'}</div></div><div class="panel"><h3>${company?'次に調べること':'小さく始めるなら'}</h3><p>${next}</p><h3>話を聞くなら</h3><p>${who}</p></div><div class="panel"><h3>AI分析用プロンプト</h3><p class="note">任意のAIサービスへ自分で貼り付けて使えます。外部送信はしません。</p><div class="prompt">${esc(r.ai_prompt)}</div><button class="btn secondary" id="copy">プロンプトをコピー</button></div><div class="actions"><button class="btn ghost" id="reset">最初から</button><button class="btn primary" id="hist">履歴を見る</button></div>`);$('#copy').onclick=()=>copy(r.ai_prompt);$('#reset').onclick=reset;$('#hist').onclick=showHistory}
function showHistory(){progress(0);document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x.dataset.tab==='history'));let h=history();screen(`<div class="eyebrow">LOCAL HISTORY</div><h2>過去の比較結果</h2><p class="lead">この端末内に最大30件保存されます。</p>${h.length?`<div class="history">${h.map(x=>`<button class="history-item" data-id="${x.id}"><time>${new Date(x.created_at).toLocaleString('ja-JP')}</time><h3>${x.career_mode.label} · ${x.user_status.label}</h3><span class="note">興味軸: ${(x.rankings.interest||[]).slice(0,3).map(y=>y.label).join('、')}</span></button>`).join('')}</div>`:`<div class="empty">まだ結果がありません。</div>`}`);root.querySelectorAll('[data-id]').forEach(b=>b.onclick=()=>showResult(h.find(x=>x.id===b.dataset.id)))}
function reset(){if(S.view!=='home'&&!confirm('入力中の内容を消して最初からやり直しますか？'))return;S={view:'home',status:null,career:null,mode:null,phase:null,index:0,queue:[],scores:{},logs:[],rankings:{},avoid:[]};document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x.dataset.tab==='app'));home()}
function copy(t){if(navigator.clipboard&&isSecureContext)navigator.clipboard.writeText(t).then(toast).catch(()=>fallback(t));else fallback(t)}function fallback(t){let a=document.createElement('textarea');a.value=t;document.body.append(a);a.select();document.execCommand('copy');a.remove();toast()}function toast(){let t=$('#toast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1600)}function esc(s){return s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>t.dataset.tab==='history'?showHistory():reset());home();
})();
</script></body></html>
