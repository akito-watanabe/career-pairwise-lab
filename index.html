function insightFor(r){let traits=r.userTraits||freshTraits(),scored=scoreCandidates(r),company=scored.filter(x=>x.domain==='company').slice(0,5),individual=scored.filter(x=>x.domain==='individual').slice(0,5),creative=scored.filter(x=>/music|illustration|video|writing|photo|design|content|handmade/.test(x.id)).slice(0,5),overall=scored.filter(x=>x.played).slice(0,5),unexplored=scored.filter(x=>!x.played).slice(0,3),topTraits=Object.entries(traits).sort((a,b)=>b[1]-a[1]).slice(0,8).map(([id,score])=>({id,label:traitLabels[id],score})),logs=[...(r.comparisonLogs||[]),...(r.tieBreakLogs||[])],close=[];for(let i=0;i<overall.length-1;i++)if(Math.abs(overall[i].score-overall[i+1].score)<=2)close.push(`${overall[i].label}と${overall[i+1].label}が接戦です`);let both=logs.filter(x=>x.answer==='both').slice(-2),unknown=logs.filter(x=>x.answer==='unknown').slice(-2);both.forEach(x=>close.push(`${x.a}と${x.b}は「どちらもあり」でした`));unknown.forEach(x=>close.push(`${x.a}と${x.b}は、まだ判断材料が不足しています`));if(!close.length)close.push('上位候補と未探索候補を追加で比べると、判断軸がより明確になります');let mapItems=[...overall,...unexplored].slice(0,8),points=mapItems.map(x=>{let w=x.trait_weights||{},px=(w.autonomy||0)-(w.team_support||0),py=(w.creativity||0)+(w.risk_tolerance||0)-(w.stability||0);return{id:x.id,label:x.label,x:Math.max(-1,Math.min(1,px/1.2)),y:Math.max(-1,Math.min(1,py/1.8)),domain:x.domain}});let possibilityMap={company:company.map(x=>x.label),individual:individual.map(x=>x.label),creative:creative.map(x=>x.label),points},lean=points.length?`可能性マップでは${points.reduce((n,x)=>n+x.x,0)>=0?'個人自律':'組織所属'}側、${points.reduce((n,x)=>n+x.y,0)>=0?'創作・挑戦':'安定運用'}側への反応がやや見られます`:'回答数が少ないため方向性は未確定です';return{overall,company,individual,creative,topTraits,unexplored,closeContests:close.slice(0,5),possibilityMap,lean,actions:[`「${(overall[0]||company[0]).label}」に近い人へ30分話を聞く`,`「${(individual[0]||{label:'気になる個人活動'}).label}」を1日だけ試す`,`${unexplored.map(x=>x.label).join('・')}を各15分調べる`,'AIプロンプトで追加比較すべき問いを出してもらう']}}
function record(){let status={id:S.status,label:label(D.status,S.status)},career={id:S.career,label:label(D.career,S.career)},overall=ranking('career'),workStyles=ranking('workStyle'),candidateStats={career:Object.values(S.scores.career||{}).map(x=>({...x,winRate:x.played?x.wins/x.played:0})),workStyles:Object.values(S.scores.workStyle||{}).map(x=>({...x,winRate:x.played?x.wins/x.played:0}))};let base={id:String(Date.now()),created_at:new Date().toISOString(),version:'0.6',mode:'five_min_exploratory_career_pairwise',career_branch:S.mode,is_completed:true,is_early_result:S.isEarlyResult,question_count:S.questionCount,user_status:status,career_mode:career,rankings:{overall,workStyles},candidateStats,userTraits:{...S.userTraits},avoidFactors:S.avoid.map(id=>label(S.mode==='company'?D.avoid:D.risk,id)),comparisonLogs:S.logs,tieBreakLogs:S.tieLogs};let insight=insightFor(base);base.possibilityMap=insight.possibilityMap;base.closeContests=insight.closeContests;base.unexploredCandidates=insight.unexplored;base.insights=insight;base.aiPrompt=promptFor(base);return base}
function promptFor(r){let insight=r.insights||insightFor(r),fmt=list=>list.slice(0,5).map((x,i)=>`${i+1}. ${x.label} (${x.visualScore||x.score||0})`).join('\n'),logs=[...(r.comparisonLogs||[]),...(r.tieBreakLogs||[])],reasons=logs.filter(x=>x.reason).map(x=>`- ${x.a} / ${x.b}: ${x.reason}`).join('\n')||'なし';return `これは約5分の短縮版キャリア探索の結果です。適職を断定せず、追加調査のための仮説として分析してください。\n\n回答数: ${r.question_count} / 最大20\n状態: ${r.is_early_result?'途中結果':'完了結果'}\n現在地: ${r.user_status.label}\n選択した出発点: ${r.career_mode.label}\ntrait上位: ${insight.topTraits.map(x=>`${x.label}(${x.score.toFixed(1)})`).join('、')}\n可能性マップ傾向: ${insight.lean}\n総合上位候補:\n${fmt(insight.overall)}\n会社員寄り候補:\n${fmt(insight.company)}\n個人活動寄り候補:\n${fmt(insight.individual)}\n創作・副業候補:\n${fmt(insight.creative)}\n迷い・接戦: ${insight.closeContests.join(' / ')}\n未探索候補: ${insight.unexplored.map(x=>x.label).join('、')}\n避けたい要素: ${(r.avoidFactors||[]).join('、')||'未選択'}\n回答理由:\n${reasons}\n\n結果を断定せず、迷いの構造と反証材料を示してください。次に調べること、小さく試す行動、追加で比較すべき問いを具体的に出してください。`;}
function save(r){let h=history();h.unshift(r);localStorage.setItem('careerPairwiseLabHistory',JSON.stringify(h.slice(0,30)))}function history(){try{let value=JSON.parse(localStorage.getItem('careerPairwiseLabHistory'));return Array.isArray(value)?value:[]}catch{localStorage.removeItem('careerPairwiseLabHistory');return[]}}
function ranks(title,items){return `<div class="panel"><h3>${title}</h3>${(items||[]).slice(0,5).map((x,i)=>{let played=x.played||0,rate=Math.round((x.winRate||0)*100),reason=(x.mainReasons||[])[0];return `<div class="rank-wrap"><div class="rank"><span class="num">${i+1}</span><b>${x.label}</b><em>${x.score} pt</em></div><div class="rank-meta">${x.wins||0}勝 ${x.draws||0}分 ${x.losses||0}敗 · ${played}比較 · 勝率${rate}%</div>${reason?`<div class="rank-reason">理由例：${esc(reason)}</div>`:''}</div>`}).join('')}</div>`}
function renderRadarChart(traits){let items=[...traits].slice(0,8),cx=160,cy=155,r=105,max=Math.max(1,...items.map(x=>Math.max(0,x.score))),point=(i,ratio=1)=>{let a=-Math.PI/2+i*Math.PI*2/items.length;return[cx+Math.cos(a)*r*ratio,cy+Math.sin(a)*r*ratio]},poly=ratio=>items.map((_,i)=>point(i,ratio).join(',')).join(' '),shape=items.map((x,i)=>point(i,Math.max(.08,Math.max(0,x.score)/max)).join(',')).join(' ');return `<svg class="viz" viewBox="0 0 320 320" role="img" aria-label="上位traitのレーダーチャート">${[.25,.5,.75,1].map(x=>`<polygon class="grid" points="${poly(x)}"/>`).join('')}${items.map((_,i)=>{let p=point(i);return`<line class="axis" x1="${cx}" y1="${cy}" x2="${p[0]}" y2="${p[1]}"/>`}).join('')}<polygon class="shape" points="${shape}"/>${items.map((x,i)=>{let p=point(i,1.18);return`<text x="${p[0]}" y="${p[1]}" text-anchor="middle">${esc(x.label)}</text>`}).join('')}</svg>`}
function renderPossibilityMap(points){return `<svg class="viz" viewBox="0 0 340 330" role="img" aria-label="組織所属と個人自律、安定運用と創作挑戦の可能性マップ"><line class="axis" x1="35" y1="160" x2="305" y2="160"/><line class="axis" x1="170" y1="25" x2="170" y2="295"/><text x="8" y="155">組織所属</text><text x="278" y="155">個人自律</text><text x="170" y="16" text-anchor="middle">創作・挑戦</text><text x="170" y="315" text-anchor="middle">安定運用</text>${points.map((p,i)=>{let x=170+p.x*115,y=160-p.y*115,color=p.domain==='company'?'#2e6b52':'#db5d3b';return`<circle cx="${x}" cy="${y}" r="7" fill="${color}" stroke="white" stroke-width="2"/><text x="${x}" y="${y+(i%2?18:-12)}" text-anchor="middle">${esc(p.label.slice(0,9))}</text>`}).join('')}</svg>`}
function bars(title,items){return `<div class="panel"><h3>${title}</h3>${items.slice(0,5).map(x=>`<div class="bar-row"><b>${x.label}</b><div class="bar-track"><div class="bar-fill" style="width:${Math.max(4,x.visualScore||0)}%"></div></div><span>${x.visualScore||0}</span></div>`).join('')||'<p class="note">回答数が少ないため候補は未確定です。</p>'}</div>`}
function showResult(r){progress(1);let insight=r.insights||insightFor(r),avoid=r.avoidFactors||r.avoid_factors||[],prompt=r.aiPrompt||r.ai_prompt||'',early=r.is_early_result;screen(`<div class="result-head"><div class="eyebrow">5 MINUTE EXPLORATORY MAP · v0.6</div><h2>これは正解ではなく、次に調べるための仮説です。</h2><p>${early?'今回は途中までの回答をもとにした仮説です。追加で比較すると精度が上がります。':`${r.question_count||0}問の回答から傾向を整理しました。`}</p></div><div class="panel"><h3>traitレーダー</h3><p class="note">上位8傾向を相対表示しています。能力の高さではありません。</p>${renderRadarChart(insight.topTraits)}</div><div class="panel"><h3>キャリア可能性マップ</h3><p>${insight.lean}。</p>${renderPossibilityMap(insight.possibilityMap.points||[])}<p class="note">このマップは正解ではなく、回答傾向をもとにした探索用の仮説です。緑は会社員候補、橙は個人活動候補です。</p></div>${bars('総合上位候補',insight.overall)}${bars('会社員寄り候補',insight.company)}${bars('個人活動寄り候補',insight.individual)}${bars('創作・副業候補',insight.creative)}<div class="panel"><h3>迷い・接戦ポイント</h3>${insight.closeContests.map(x=>`<div class="contest">${esc(x)}</div>`).join('')}</div><div class="panel"><h3>未探索候補</h3><p class="note">まだ十分に比べていませんが、trait相性から追加で見る価値がありそうです。</p>${insight.unexplored.map(x=>`<div class="rank"><b>${x.label}</b><em>未探索</em></div>`).join('')}</div><div class="panel"><h3>避けたい要素</h3><div class="chips">${avoid.length?avoid.map(x=>`<span class="chip">${x}</span>`).join(''):'<span class="note">未選択</span>'}</div></div><div class="panel"><h3>次に試す小さな行動</h3><ul>${insight.actions.map(x=>`<li>${x}</li>`).join('')}</ul></div><div class="panel"><h3>AI分析用プロンプト</h3><p class="note">任意のAIサービスへ貼り付けて使えます。外部送信はしません。</p><div class="prompt">${esc(prompt)}</div><button class="btn secondary" id="copy">プロンプトをコピー</button></div><div class="panel"><div class="saved">この結果は端末内の履歴に保存されました</div></div><div class="actions"><button class="btn ghost" id="reset">最初から</button><button class="btn primary" id="hist">履歴を見る</button></div>`);$('#copy').onclick=()=>copy(prompt);$('#reset').onclick=reset;$('#hist').onclick=showHistory}
function showHistory(){progress(0);document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x.dataset.tab==='history'));let h=history();screen(`<div class="eyebrow">LOCAL HISTORY</div><h2>過去の比較結果</h2><p class="lead">この端末内に最大30件保存されます。</p>${h.length?`<div class="history">${h.map(x=>`<button class="history-item" data-id="${x.id}"><time>${new Date(x.created_at).toLocaleString('ja-JP')}</time><h3>${x.career_mode.label} · ${x.user_status.label}</h3><span class="note">${x.version||'旧版'} · ${x.question_count||'—'}問 · ${getRank(x,'career').slice(0,3).map(y=>y.label).join('、')}</span></button>`).join('')}</div>`:`<div class="empty">まだ結果がありません。</div>`}`);root.querySelectorAll('[data-id]').forEach(b=>b.onclick=()=>showResult(h.find(x=>x.id===b.dataset.id)))}
function reset(){if(S.view!=='home'&&!confirm('入力中の内容を消して最初からやり直しますか？'))return;S={view:'home',status:null,career:null,mode:null,phase:null,index:0,queue:[],scores:{},selected:{},logs:[],tieLogs:[],explorationLogs:[],rankings:{},avoid:[],userTraits:freshTraits(),questionCount:0,isEarlyResult:false,isTieBreak:false,tieBreakCount:0};document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x.dataset.tab==='app'));home()}
function copy(t){if(navigator.clipboard&&isSecureContext)navigator.clipboard.writeText(t).then(toast).catch(()=>fallback(t));else fallback(t)}function fallback(t){let a=document.createElement('textarea');a.value=t;document.body.append(a);a.select();document.execCommand('copy');a.remove();toast()}function toast(){let t=$('#toast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1600)}function esc(s){return s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}
const showResultCurrent=showResult;showResult=r=>showResultCurrent(r.version==='0.6'?r:{...r,insights:null});

})();
